<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Manager - Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .budget-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: 0.3s;
    }
    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      margin: 1rem 0 0.5rem 0;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .budget-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .cat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 92, 246, 0.1);
      color: var(--accent);
    }
    .f-group { margin-bottom: 1.25rem; }
    .f-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; color: var(--text-primary); font-size: 0.9375rem; outline: none; transition: 0.2s; }
    .f-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <header class="header" style="margin-bottom: 2rem; border-bottom: none;">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button onclick="window.location.href='index.html'" style="background: none; border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center;">
          <i data-lucide="chevron-left"></i>
        </button>
        <h1 style="font-size: 1.5rem; font-weight: 800;">Budgeting</h1>
      </div>
      <button onclick="showAddModal()" style="background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="plus"></i>
      </button>
    </header>

    <div id="budget-list">
      <!-- Dynamic Budget Cards -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(139, 92, 246, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="pie-chart" style="width: 40px; height: 40px; color: var(--accent);"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">No Budgets Set</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">Track your spending categories by setting monthly limits.</p>
    </div>
  </div>

  <!-- Add Budget Modal -->
  <div id="budget-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-card" style="padding: 1.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 style="font-weight: 800;">New Budget</h3>
        <button onclick="closeModal()" class="close-btn"><i data-lucide="x"></i></button>
      </div>
      
      <div class="f-group">
        <label class="f-label">Category</label>
        <select id="f-category" class="f-input">
          <option>Food & Beverage</option>
          <option>Transport</option>
          <option>Lifestyle</option>
          <option>Shopping</option>
          <option>Entertainment</option>
          <option>Bills & Utilities</option>
          <option>Health</option>
          <option>Education</option>
          <option>Others</option>
        </select>
      </div>

      <div class="f-group">
        <label class="f-label">Monthly Limit (Rp)</label>
        <input type="number" id="f-limit" class="f-input" placeholder="e.g. 2000000">
      </div>

      <div class="f-group">
        <label class="f-label">Note</label>
        <input type="text" id="f-note" class="f-input" placeholder="e.g. Maximize eating out for weekends only">
      </div>

      <button onclick="saveBudget()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 1.1rem; border-radius: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s;">Set Budget</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    let budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
    let txs = JSON.parse(localStorage.getItem('transactions') || '[]');

    function refreshList() {
      const list = document.getElementById('budget-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      
      if (budgets.length === 0) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'none';
      }

      budgets.forEach((b, idx) => {
        // Calculate spent for this category in current month
        const now = new Date();
        const monthStr = now.toISOString().substring(0, 7); // YYYY-MM
        const spent = txs.filter(t => t.category === b.category && (t.date || "").startsWith(monthStr) && t.type === 'Expense')
                         .reduce((s, t) => s + t.amount, 0);
        
        const perc = Math.min((spent / b.limit) * 100, 100);
        const color = perc > 90 ? '#ef4444' : (perc > 70 ? '#f59e0b' : '#22c55e');

        const card = document.createElement('div');
        card.className = 'budget-card';
        card.innerHTML = `
          <div class="budget-info">
            <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;">
               <div class="cat-icon"><i data-lucide="tag"></i></div>
               <div>
                 <div style="font-weight: 700; font-size: 1rem;">${b.category}</div>
                 ${b.note ? `<div style="font-size: 0.7rem; opacity: 0.6; font-style: italic; margin: 0.1rem 0;">${b.note}</div>` : ''}
                 <div style="font-size: 0.75rem; color: var(--text-secondary);">Rp ${spent.toLocaleString('id-ID')} of Rp ${b.limit.toLocaleString('id-ID')}</div>
               </div>
            </div>
            <button onclick="deleteBudget(${idx})" style="background: none; border: none; color: #ef4444; opacity: 0.3; cursor: pointer;">
              <i data-lucide="trash-2" style="width: 16px;"></i>
            </button>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="width: ${perc}%; background: ${color};"></div>
          </div>
          <div style="display:flex; justify-content: space-between; font-size: 0.7rem; font-weight: 600; margin-top: 0.5rem;">
             <span style="color: ${color}">${Math.round((spent/b.limit)*100)}% Used</span>
             <span style="opacity: 0.5;">Rp ${(b.limit - spent).toLocaleString('id-ID')} Left</span>
          </div>
        `;
        list.appendChild(card);
      });
      lucide.createIcons();
    }

    function showAddModal() { document.getElementById('budget-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('budget-modal').style.display = 'none'; }

    function saveBudget() {
      const cat = document.getElementById('f-category').value;
      const limit = parseInt(document.getElementById('f-limit').value);
      const note = document.getElementById('f-note').value;
      
      if (!limit) { alert('Please enter a limit'); return; }

      // Update if exists or add new
      const existing = budgets.findIndex(b => b.category === cat);
      if (existing >= 0) {
        budgets[existing].limit = limit;
        budgets[existing].note = note;
      } else {
        budgets.push({ category: cat, limit, note });
      }

      localStorage.setItem('budgets', JSON.stringify(budgets));
      closeModal();
      refreshList();
    }

    function deleteBudget(idx) {
      if (!confirm('Remove this budget?')) return;
      budgets.splice(idx, 1);
      localStorage.setItem('budgets', JSON.stringify(budgets));
      refreshList();
    }

    refreshList();
  </script>
</body>
</html>
