<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchant Management - Finance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="theme.js"></script>
  <style>
    :root {
      --violet: #8B5CF6;
      --bg-darker: var(--bg-secondary);
    }

    .search-container { position: relative; margin-bottom: 1rem; }
    .search-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 0.8125rem 1rem 0.8125rem 2.75rem; color: var(--text-primary); outline: none; transition: 0.3s; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 18px; }

    .filter-scroll { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 1.5rem; scrollbar-width: none; }
    .filter-chip { padding: 0.5rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 2rem; color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
    .filter-chip.active { background: var(--violet); border-color: var(--violet); color: var(--text-primary); }

    .merchant-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s; }
    .m-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-primary); }
    
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); z-index: 1000; display: none; overflow-y: auto; }
    .modal-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; background: var(--bg-darker); }
    .modal-header { padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-darker); z-index: 10; }
    
    .modal-tabs { display: flex; background: var(--glass); padding: 0.25rem; border-radius: 0.75rem; margin: 1rem 1.5rem; gap: 0.25rem; }
    .modal-tab { flex: 1; padding: 0.6rem; border-radius: 0.6rem; border: none; background: none; color: var(--text-secondary); font-weight: 600; font-size: 0.8125rem; cursor: pointer; }
    .modal-tab.active { background: var(--violet); color: var(--text-primary); }

    .view-content { padding: 1.5rem; display: none; flex-direction: column; gap: 1.5rem; }
    .view-content.active { display: flex; }

    .map-box { width: 100%; border-radius: 1rem; border: 1px solid var(--border); background: rgba(255,255,255,0.02); overflow: hidden; position: relative; aspect-ratio: 16/9; }
    iframe { width: 100%; height: 100%; border:0; filter: invert(90%) hue-rotate(180deg) brightness(0.9); }

    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .form-label span { color: var(--violet); }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.8125rem 1rem; color: var(--text-primary); outline: none; transition: 0.3s; font-size: 0.9375rem; }
    .cat-desc { font-size: 0.7rem; color: var(--text-secondary); margin-top: -0.25rem; padding: 0 0.5rem; }

    .select-wrapper { position: relative; }
    .select-wrapper::after { content: '▾'; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }

    .tags-container { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0.75rem; min-height: 48px; align-items: center; }
    .tag { display: flex; align-items: center; gap: 0.35rem; background: rgba(255,255,255,0.08); padding: 0.25rem 0.6rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; color: var(--text-primary); }
    .tag-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; padding: 0; }
    .add-tag-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 0 0.5rem; margin-left: auto; }

    .status-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
    .st-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.875rem; background: rgba(255,255,255,0.03); color: var(--text-secondary); font-weight: 600; border: none; cursor: pointer; }
    .st-btn.active.active-st { background: var(--violet); color: var(--text-primary); }
    .st-btn.inactive.active { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }

    .ana-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; }
    .ana-lbl { font-size: 0.65rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; }
    .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0.875rem; }

    .btn-violet { background: var(--violet); color: var(--text-primary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.8125rem; }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.8125rem; }
    .back-btn { width: 40px; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <header class="header" style="margin-bottom: 1.5rem;">
      <button class="back-btn" onclick="window.location.href='index.html'"><i data-lucide="chevron-left"></i></button>
      <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Merchants</h1>
      <button class="btn-violet" onclick="openModal(null, 'form')">+ New</button>
    </header>

    <div class="search-container">
       <i data-lucide="search" class="search-icon"></i>
       <input type="text" id="m-search" class="search-input" placeholder="Search merchants..." oninput="handleFilter()">
    </div>

    <div class="filter-scroll" id="m-filter-chips"></div>

    <div id="merchant-list"></div>
  </div>

  <div id="merchant-modal" class="modal-backdrop">
    <div class="modal-container">
      <header class="modal-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button style="background:none; border:none; color:white; cursor:pointer;" onclick="closeModal()"><i data-lucide="x"></i></button>
          <span id="m-title" style="font-weight: 700; font-size: 1.125rem; color: var(--text-primary);">Details</span>
        </div>
        <div id="header-actions" style="display: flex; gap: 0.5rem;"></div>
      </header>

      <div class="modal-tabs" id="modal-tabs">
         <button class="modal-tab active" data-view="analysis">Activity</button>
         <button class="modal-tab" data-view="form">Settings</button>
      </div>

      <div id="view-analysis" class="view-content active">
         <div class="ana-card">
            <div class="ana-lbl">Merchant Location</div>
            <div id="ana-address" style="font-size: 0.8125rem; color: var(--text-primary); margin-bottom: 0.75rem; font-weight: 600;">Jl. Yosodipuro No.52D, Surakarta</div>
            <div class="map-box" id="map-container"></div>
         </div>
         <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <div class="ana-card"><div class="ana-lbl">Total Spent</div><div id="ana-total" style="font-weight:700; color: var(--text-primary); font-size: 1.125rem;">Rp 0</div></div>
            <div class="ana-card"><div class="ana-lbl">Frequency</div><div id="ana-freq" style="font-weight:700; color: var(--text-primary); font-size: 1.125rem;">0 Times</div></div>
         </div>
         <section>
            <h3 style="font-size: 0.875rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.75rem;">Recent History</h3>
            <div id="ana-tx-list" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
         </section>
      </div>

      <div id="view-form" class="view-content">
        <div class="form-group"><label class="form-label">Merchant Name<span>*</span></label><input type="text" id="f-name" class="f-input"></div>
        <div class="form-group">
          <label class="form-label">Category<span>*</span></label>
          <div class="select-wrapper"><select class="f-input" id="f-category" onchange="updateCatDesc()"></select></div>
          <div id="f-cat-desc" class="cat-desc"></div>
        </div>
        <div class="form-group"><label class="form-label">Primary Contact Name</label><input type="text" id="f-contact" class="f-input"></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input type="text" id="f-phone" class="f-input"></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="f-email" class="f-input"></div>
        <div class="form-group"><label class="form-label">Website</label><input type="text" id="f-web" class="f-input"></div>
        <div class="form-group"><label class="form-label">Physical Address</label><textarea id="f-addr" class="f-input" style="min-height: 60px;"></textarea></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
           <div class="form-group"><label class="form-label">City<span>*</span></label><div class="select-wrapper"><select class="f-input" id="f-city"><option>Surakarta</option><option>Solo</option></select></div></div>
           <div class="form-group"><label class="form-label">Country<span>*</span></label><div class="select-wrapper"><select class="f-input" id="f-country"><option>Indonesia</option></select></div></div>
        </div>
        <div class="form-group"><label class="form-label">Preferred Payment Method</label><div class="tags-container" id="f-tags"><div class="tag">QRIS <button class="tag-close">×</button></div><div class="tag">Cash <button class="tag-close">×</button></div><button class="add-tag-btn"><i data-lucide="plus" style="width:16px;"></i></button></div></div>
        <div class="form-group"><label class="form-label">Bank Account Details</label><input type="text" id="f-bank" class="f-input"></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea id="f-notes" class="f-input" style="min-height: 80px;"></textarea></div>
        <div class="form-group"><label class="form-label">Status<span>*</span></label><div class="status-toggle"><button class="st-btn inactive" data-status="Inactive" onclick="setStatus('Inactive')"><i data-lucide="x-circle" style="width:16px;"></i> Inactive</button><button class="st-btn active active-st" data-status="Active" onclick="setStatus('Active')"><i data-lucide="check-circle" style="width:16px;"></i> Active</button></div></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const categories = [
      { id: 'fnb', label: 'Food & Beverage', desc: 'Restaurants, Cafés, Bakeries, or Street Food.' },
      { id: 'grocery', label: 'Groceries', desc: 'Supermarkets, Mini-markets, or Traditional Markets.' },
      { id: 'shopping', label: 'Shopping', desc: 'Clothing, Electronics, Furniture, or Household Items.' },
      { id: 'transport', label: 'Transport & Fuel', desc: 'Airlines, Trains, Ride-hailing, or Fuel Stations.' },
      { id: 'subs', label: 'Subscriptions', desc: 'Streaming (Netflix/Spotify), SaaS, or Memberships.' },
      { id: 'personal', label: 'Personal & Health', desc: 'Salons, Spas, Pharmacies, or Medical Clinics.' },
      { id: 'leisure', label: 'Leisure & Ent', desc: 'Cinemas, Theme Parks, or Hobby Stores.' },
      { id: 'business', label: 'Bills & Business', desc: 'Utilities like PLN, Office Supplies, or Prof Services.' },
      { id: 'misc', label: 'Miscellaneous', desc: 'Other merchants not fitting above categories.' }
    ];

    let merchants = [
      { id: 1, name: 'Abata Donuts & Coffee Yosodipuro', category: 'Food & Beverage', status: 'Active', color: '#8B5CF6', address: 'Jl. Yosodipuro No.52D, Surakarta', phone: '6281215399998' },
      { id: 2, name: 'Supermarket Solo', category: 'Groceries', status: 'Active', color: '#10b981', address: 'Jl. Slamet Riyadi, Surakarta' },
      { id: 3, name: 'Netflix Premium', category: 'Subscriptions', status: 'Active', color: '#ef4444', address: 'Digital/Online' }
    ];

    let activeCat = 'All';
    let searchTerm = '';

    function handleFilter() { searchTerm = document.getElementById('m-search').value.toLowerCase(); renderMerchants(); }
    function setCategory(cat) { activeCat = cat; document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.innerText === cat)); renderMerchants(); }

    function renderFilterChips() {
      const parent = document.getElementById('m-filter-chips');
      parent.innerHTML = `<button class="filter-chip active" onclick="setCategory('All')">All</button>` + 
        categories.slice(0, 5).map(c => `<button class="filter-chip" onclick="setCategory('${c.label}')">${c.label.split(' ')[0]}</button>`).join('');
    }

    function renderMerchants() {
      const filtered = merchants.filter(m => (activeCat === 'All' || m.category === activeCat) && m.name.toLowerCase().includes(searchTerm));
      document.getElementById('merchant-list').innerHTML = filtered.map(m => `
        <div class="merchant-card" onclick="openModal(${m.id}, 'analysis')"><div style="display:flex; align-items:center; gap:1rem;"><div class="m-icon" style="background:${m.color}22; color:${m.color}">${m.name.substring(0,1)}</div><div><div style="font-weight:700; color:white;">${m.name}</div><div style="font-size:0.7rem; color:var(--text-secondary);">${m.category}</div></div></div><i data-lucide="chevron-right" style="color:var(--text-secondary); width:18px;"></i></div>`).join('');
      lucide.createIcons();
    }

    function initFormItems() {
       document.getElementById('f-category').innerHTML = categories.map(c => `<option value="${c.label}">${c.label}</option>`).join('');
    }

    function updateCatDesc() {
      const val = document.getElementById('f-category').value;
      const cat = categories.find(c => c.label === val);
      document.getElementById('f-cat-desc').innerText = cat ? cat.desc : '';
    }

    const modal = document.getElementById('merchant-modal');
    const tabs = document.querySelectorAll('.modal-tab');
    const contents = document.querySelectorAll('.view-content');

    function openModal(id, view) {
      const m = id ? merchants.find(x => x.id === id) : null;
      document.getElementById('m-title').innerText = m ? m.name : 'New Merchant';
      document.getElementById('modal-tabs').style.display = id ? 'flex' : 'none';
      switchView(id ? view : 'form');

      if (m) {
         document.getElementById('ana-address').innerText = m.address;
         const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(m.address)}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
         document.getElementById('map-container').innerHTML = `<iframe src="${mapUrl}"></iframe>`;
         const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
         const filtered = txs.filter(t => (t.merchant || '').toLowerCase().includes(m.name.split(' ')[0].toLowerCase()));
         document.getElementById('ana-total').innerText = 'Rp ' + filtered.reduce((s,t)=>s+t.amount,0).toLocaleString('id-ID');
         document.getElementById('ana-freq').innerText = filtered.length + ' Times';
         document.getElementById('ana-tx-list').innerHTML = filtered.map(t => `<div class="tx-item"><div><div style="font-weight:600; color:white; font-size:0.875rem;">${t.name}</div><div style="font-size:0.65rem; color:var(--text-secondary);">${t.date}</div></div><div style="font-weight:700; color:#ef4444;">- Rp ${t.amount.toLocaleString('id-ID')}</div></div>`).join('');
         document.getElementById('f-name').value = m.name;
         document.getElementById('f-category').value = m.category;
         document.getElementById('f-addr').value = m.address || '';
         document.getElementById('f-phone').value = m.phone || '';
         setStatus(m.status);
         updateCatDesc();
      }
      modal.style.display = 'block';
      lucide.createIcons();
    }

    function switchView(view) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.view === view));
      contents.forEach(c => c.classList.toggle('active', c.id === 'view-' + view));
      const actions = document.getElementById('header-actions');
      if (view === 'form') actions.innerHTML = `<button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-violet" onclick="save()">Save</button>`;
      else actions.innerHTML = '';
    }

    function setStatus(s) { document.querySelectorAll('.st-btn').forEach(b => { const act = b.dataset.status === s; b.classList.toggle('active', act); if (s === 'Active') b.classList.toggle('active-st', act); }); }
    tabs.forEach(t => t.onclick = () => switchView(t.dataset.view));
    function closeModal() { modal.style.display = 'none'; document.body.style.overflow='auto'; }
    function save() { alert('Updated!'); closeModal(); }
    
    renderFilterChips();
    initFormItems();
    renderMerchants();
  </script>
</body>
</html>
