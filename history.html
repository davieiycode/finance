<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - Finance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="theme.js"></script>
  <style>
    .search-bar { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 0.875rem 1rem 0.875rem 2.75rem; color: var(--text-primary); outline: none; font-size: 0.9375rem; transition: all 0.3s; }
    .search-bar:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
    
    .transaction-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .transaction-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 1rem; cursor: pointer; transition: all 0.2s; }
    .transaction-item:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--accent); transform: translateY(-2px); }
    .item-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .item-info { flex: 1; }
    .item-name { font-weight: 600; font-size: 0.9375rem; color: var(--text-primary); }
    .item-meta { font-size: 0.75rem; color: var(--text-secondary); }
    .item-amount { text-align: right; font-weight: 700; font-size: 0.9375rem; }

    .back-btn { width: 40px; height: 40px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-card { background: rgba(25, 25, 30, 0.8); border: 1px solid var(--border); border-radius: 1.5rem; width: 100%; max-width: 400px; overflow: hidden; }
    .action-h-btn { display: flex; align-items: center; justify-content: center; padding: 0.75rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 2rem; cursor: pointer; transition: all 0.3s; overflow: hidden; font-weight: 600; font-size: 0.8125rem; }
    .action-h-label { width: 0; opacity: 0; transition: all 0.3s; overflow: hidden; white-space: nowrap; }
    .action-h-btn:hover { gap: 0.5rem; padding: 0.75rem 1.25rem; border-color: var(--btn-color); }
    .action-h-btn:hover .action-h-label { width: auto; opacity: 1; }
    .close-btn { background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
    .filter-panel { padding: 1.25rem; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 1.25rem; margin-top: 1rem; display: none; flex-direction: column; gap: 1rem; }
    
    .date-group-header {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 1.5rem 0 0.75rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .date-group-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }
    
    /* Swipe Gestures */
    .transaction-swipe-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
      margin-bottom: 0.75rem;
      background: var(--bg-secondary);
      touch-action: pan-y;
    }

    .swipe-actions {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      z-index: 1;
      height: 100%;
    }

    .swipe-actions-left { left: 0; }
    .swipe-actions-right { right: 0; }

    .swipe-btn {
      height: 100%;
      min-width: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: white !important;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .swipe-btn i { width: 18px; height: 18px; }
    .swipe-btn span { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }
    
    .bg-edit { background: var(--accent); }
    .bg-duplicate { background: #3b82f6; }
    .bg-cleared { background: #10b981; }
    .bg-merge { background: #f59e0b; }

    .transaction-item {
      margin-bottom: 0 !important;
      position: relative;
      z-index: 2;
      background: var(--bg-secondary) !important;
      transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <div class="sticky-nav">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="back-btn" onclick="window.location.href='index.html'"><i data-lucide="chevron-left"></i></button>
          <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">History</h1>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button onclick="toggleHistorySearch()" class="back-btn" style="border-radius: 50%;">
            <i data-lucide="search" style="width: 18px;"></i>
          </button>
          <button id="filter-toggle" class="back-btn" style="border-radius: 12px; height: 36px; padding: 0 0.75rem; width: auto; font-size: 0.75rem; font-weight: 600; gap: 0.4rem;">
            <i data-lucide="filter" style="width: 16px;"></i> Filter
          </button>
        </div>
      </header>

      <div id="filter-panel" class="filter-panel" style="padding: 1.25rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1.25rem; margin-top: 1rem; display: none; flex-direction: column; gap: 1rem;">
         <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
               <label style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; display: block; letter-spacing: 0.05em;">From</label>
               <input type="date" class="search-bar" id="filter-date-from" style="padding: 0.65rem 0.8rem; font-size: 0.8125rem; width: 100%;" onclick="this.showPicker()">
            </div>
            <div>
               <label style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; display: block; letter-spacing: 0.05em;">To</label>
               <input type="date" class="search-bar" id="filter-date-to" style="padding: 0.65rem 0.8rem; font-size: 0.8125rem; width: 100%;" onclick="this.showPicker()">
            </div>
         </div>
         <button id="apply-filter" class="btn btn-primary" style="padding: 0.75rem; font-weight: 700; border-radius: 0.75rem; width: 100%; background: var(--accent); color: white; border: none; cursor: pointer;">Apply Filter</button>
      </div>

      <div id="history-search-container" style="position: relative; display: none; transform-origin: top; animation: slideInSearch 0.3s ease-out; margin-top: 1rem;">
        <i data-lucide="search" style="position: absolute; left: 1rem; top: 0.8rem; width: 18px; color: var(--text-secondary);"></i>
        <input type="text" id="master-search" class="search-bar" placeholder="Search merchant, item, or category..." style="padding-top: 0.75rem; padding-bottom: 0.75rem;">
      </div>
    </div>

    <style>
      @keyframes slideInSearch {
        from { opacity: 0; transform: scaleY(0); }
        to { opacity: 1; transform: scaleY(1); }
      }
    </style>

    <script>
      window.toggleHistorySearch = () => {
        const s = document.getElementById('history-search-container');
        const inp = document.getElementById('master-search');
        if (s.style.display === 'none') {
          s.style.display = 'block';
          inp.focus();
        } else {
          s.style.display = 'none';
          inp.value = '';
          const event = new Event('input', { bubbles: true });
          inp.dispatchEvent(event);
        }
      }
    </script>

    <div id="results-count" style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 1rem; font-weight: 500;">Showing 0 transactions</div>

    <div id="transaction-list" class="transaction-list">
      <!-- Dynamic list -->
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-backdrop" style="display: none; padding: 0;">
    <div class="modal-card" style="max-width: 100%; width: 100%; height: 100%; border-radius: 0; display: flex; flex-direction: column; background: var(--bg-primary);">
      <header class="header" style="justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-secondary);">
        <button id="close-modal-btn" class="back-btn" style="border-radius: 50%;"><i data-lucide="x"></i></button>
        <span style="font-weight: 800; font-size: 1rem; color: var(--text-primary);">Transaction Details</span>
        <div style="width: 40px;"></div>
      </header>
      
      <div style="flex: 1; padding: 2rem; overflow-y: auto;">
        <div style="text-align: center; margin-bottom: 2rem;">
           <span id="m-item-name" style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">-</span>
           <div id="m-total" style="font-size: 2.5rem; font-weight: 800; color: var(--accent); margin-top: 0.5rem;">Rp 0</div>
           <div id="m-calculation" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.75rem; background: var(--bg-input); padding: 0.6rem 1rem; border-radius: 0.75rem; display: inline-block; font-family: monospace; border: 1px solid var(--border);">
             -
           </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; border-top: 1px solid var(--border); padding-top: 2rem;">
           <div>
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Category</label>
             <div id="m-category" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div>
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Merchant</label>
             <div id="m-merchant" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div style="grid-column: span 2;" id="m-payment-group">
               <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Payment Account</label>
               <div id="m-payment-account" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div style="grid-column: span 2; display:none;" id="m-beneficiary-group">
               <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Beneficiary Account</label>
               <div id="m-beneficiary-account" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div>
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Status</label>
             <div id="m-status" style="font-weight: 800; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div>
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Author</label>
             <div id="m-author" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div style="grid-column: span 2;">
              <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Date & Time</label>
              <div id="m-date" style="font-weight: 600; font-size: 0.9375rem; margin-top: 0.25rem;">-</div>
           </div>
           <div style="grid-column: span 2;">
              <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Classification</label>
              <div id="m-chips" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem;"></div>
           </div>
           <div style="grid-column: span 2; display:none;" id="m-desc-box">
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Notes</label>
             <div id="m-description" style="font-size: 0.8125rem; color: var(--text-primary); line-height: 1.6; margin-top: 0.4rem; padding: 1rem; background: var(--bg-input); border-radius: 0.75rem; border: 1px solid var(--border);">-</div>
           </div>
           <div style="grid-column: span 2; display:none; margin-top: 1rem;" id="m-receipt-box">
             <label class="label" style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Cloud Receipt</label>
             <div style="margin-top: 0.75rem; border-radius: 1.25rem; overflow: hidden; border: 2px solid var(--border); aspect-ratio: 16/9; background: var(--bg-input); box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
               <img id="m-receipt-img" src="" style="width: 100%; height: 100%; object-fit: cover; cursor: pointer;">
             </div>
           </div>
        </div>
      </div>
      
      <div class="action-bar" style="padding: 1.5rem 1.5rem 3rem 1.5rem; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.75rem;">
         <button id="m-clear-btn" class="btn" style="width: 100%; padding: 1.125rem; border-radius: 1rem; border: none; background: #10b981; color: white; font-weight: 800; font-size: 1rem; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 0.5rem; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);">
           <i data-lucide="check-circle"></i> Clear Transaction
         </button>
         <div style="display: flex; gap: 0.75rem;">
           <button id="m-edit" class="action-h-btn" style="flex: 1; --btn-color: var(--accent); color: var(--accent);"><i data-lucide="edit-3"></i><span class="action-h-label">Edit</span></button>
           <button id="m-duplicate" class="action-h-btn" style="flex: 1; --btn-color: #a78bfa; color: #a78bfa;"><i data-lucide="copy"></i><span class="action-h-label">Dup</span></button>
           <button id="m-delete" class="action-h-btn" style="flex: 1; --btn-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.05);"><i data-lucide="trash-2"></i><span class="action-h-label">Del</span></button>
         </div>
      </div>
    </div>
  </div>


  <script>
    lucide.createIcons();
    const transactionList = document.getElementById('transaction-list');
    const resultsCount = document.getElementById('results-count');
    const searchInput = document.getElementById('master-search');
    const detailModal = document.getElementById('detail-modal');
    let activeTx = null;
    let mainTxs = [];

    function refreshHistory() {
      let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      
      if (txs.length === 0) {
        txs = [
          { id: 1, type: 'Expense', category: 'Food & Beverage', merchant: 'Indomaret', name: 'Groceries', amount: 12200, qty: 2, date: '2024-03-24', time: '13:26', cleared: true, tags: ['daily'], projects: ['family'], author: 'Alex', total: 24400 },
          { id: 2, type: 'Expense', category: 'Transport', merchant: 'Pertamina', name: 'Fuel', amount: 10000, qty: 5, date: '2024-03-23', time: '09:15', cleared: true, tags: ['car'], author: 'Alex', total: 50000 },
          { id: 3, type: 'Expense', category: 'Lifestyle', merchant: 'Starbucks', name: 'Coffee', amount: 65000, qty: 1, date: '2024-03-22', time: '15:40', cleared: false, tags: ['work'], author: 'Alex', total: 65000 }
        ];
        localStorage.setItem('transactions', JSON.stringify(txs));
      }

      // Migration: Convert old structure (amount=Total, price=UnitPrice) to new (total=Total, amount=UnitPrice)
      mainTxs = txs.map(t => {
        if (t.total === undefined && t.amount !== undefined) {
          t.total = t.amount;
          t.amount = t.price || (t.total / (t.qty || 1));
        }
        return t;
      });
      
      renderList(mainTxs);
    }

    function formatDateHeader(dateStr) {
      if (!dateStr) return 'Unknown Date';
      const d = new Date(dateStr);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const targetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());

      if (targetDate.getTime() === today.getTime()) return 'Today';
      if (targetDate.getTime() === yesterday.getTime()) return 'Yesterday';

      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderList(list) {
      transactionList.innerHTML = list.length === 0 ? '<p style="text-align:center; padding:2rem; opacity:0.5; font-size:0.875rem;">No results found.</p>' : '';
      
      const sorted = list.sort((a,b) => {
        const dtA = (a.date || "") + " " + (a.time || "00:00");
        const dtB = (b.date || "") + " " + (b.time || "00:00");
        return dtB.localeCompare(dtA);
      });

      let lastDate = null;
      
      sorted.forEach(t => {
        if (t.date !== lastDate) {
          const header = document.createElement('div');
          header.className = 'date-group-header';
          header.innerText = formatDateHeader(t.date);
          transactionList.appendChild(header);
          lastDate = t.date;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'transaction-swipe-wrapper';
        const isExp = t.type === 'Expense';
        
        wrapper.innerHTML = `
          <div class="swipe-actions swipe-actions-left">
            <button class="swipe-btn bg-cleared" onclick="showDetailById('${t.id}')">
              <i data-lucide="eye"></i><span>Summary</span>
            </button>
          </div>
          <div class="swipe-actions swipe-actions-right">
            <button class="swipe-btn bg-merge" onclick="swipeMerge('${t.id}')">
              <i data-lucide="git-merge"></i><span>Merge</span>
            </button>
            <button class="swipe-btn bg-duplicate" onclick="swipeDuplicate('${t.id}')">
              <i data-lucide="copy"></i><span>Dup</span>
            </button>
            <button class="swipe-btn bg-edit" onclick="swipeEdit('${t.id}')">
              <i data-lucide="edit-3"></i><span>Edit</span>
            </button>
          </div>
          <div class="transaction-item" onclick="if(this.dataset.swiping !== 'true') showDetailById('${t.id}')">
            <div class="item-icon" style="background: ${isExp ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)'}; color: ${isExp ? '#ef4444' : '#10b981'};">
              <i data-lucide="${isExp ? 'shopping-cart' : 'banknote'}"></i>
            </div>
            <div class="item-info">
              <div class="item-name">${t.name}</div>
              <div class="item-meta">${t.merchant ? t.merchant + ' • ' : ''}${t.category} • ${t.time || '00:00'}</div>
            </div>
            <div class="item-amount" style="color: ${isExp ? '#ef4444' : '#10b981'};">
              ${isExp ? '-' : '+'}Rp ${t.total.toLocaleString('id-ID')}
            </div>
          </div>
        `;
        transactionList.appendChild(wrapper);
      });
      lucide.createIcons();
      setupSwipeListeners();
      resultsCount.innerText = `Showing ${list.length} transactions`;
    }

    window.showDetailById = (id) => {
      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      const t = txs.find(tx => tx.id == id);
      if (t) showDetail(t);
    };

    function setupSwipeListeners() {
      const list = document.getElementById('transaction-list');
      let startX, startY;
      let currentItem = null;
      let dx = 0;
      let isHorizontal = false;

      list.onmousedown = list.ontouchstart = (e) => {
        const item = e.target.closest('.transaction-item');
        if (!item) return;
        currentItem = item;
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        item.style.transition = 'none';
        isHorizontal = false;
        
        document.querySelectorAll('.transaction-item').forEach(el => {
           if(el !== item) el.style.transform = '';
        });
      };

      list.onmousemove = list.ontouchmove = (e) => {
        if (!currentItem) return;
        const curX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const curY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        dx = curX - startX;
        const dy = curY - startY;

        if (!isHorizontal && Math.abs(dx) > Math.abs(dy)) {
           isHorizontal = true;
        }

        if (isHorizontal) {
           if (dx > 100) dx = 70 + (dx - 70) * 0.2;
           if (dx < -250) dx = -210 + (dx + 210) * 0.2;
           currentItem.style.transform = `translateX(${dx}px)`;
        }
      };

      window.onmouseup = window.ontouchend = (e) => {
        if (!currentItem) return;
        currentItem.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
        
        if (dx < -60) {
          currentItem.style.transform = 'translateX(-210px)';
        } else if (dx > 60) {
          currentItem.style.transform = 'translateX(70px)';
        } else {
          currentItem.style.transform = '';
        }
        
        if (Math.abs(dx) > 10) {
           currentItem.dataset.swiping = 'true';
           const it = currentItem;
           setTimeout(() => { if(it) it.dataset.swiping = 'false'; }, 300);
        }
        
        currentItem = null;
        dx = 0;
      };
    }

    function swipeDuplicate(id) { window.location.href = `transaction.html?mode=duplicate&id=${id}`; }
    function swipeEdit(id) { window.location.href = `transaction.html?mode=edit&id=${id}`; }
    function swipeMerge(id) { 
       if(typeof showToast === 'function') showToast("Visit Merchant page to Merge.", "info", "git-merge");
       else alert("Visit Merchant page to Merge.");
    }

    function showDetail(t) {
      activeTx = t;
      document.getElementById('m-item-name').innerText = t.name;
      document.getElementById('m-total').innerText = (t.type === 'Expense' ? '-Rp ' : '+Rp ') + t.total.toLocaleString('id-ID');
      document.getElementById('m-category').innerText = t.category;
      document.getElementById('m-merchant').innerText = t.merchant || '-';
      document.getElementById('m-date').innerText = `${t.date} ${t.time || ''}`;
      document.getElementById('m-author').innerText = t.author || '-';
      const txType = (t.type || 'Expense').toLowerCase();
      const multiAccount = ['transfer', 'savings', 'investment'].includes(txType);
      
      const pGroup = document.getElementById('m-payment-group');
      const bGroup = document.getElementById('m-beneficiary-group');

      if (txType === 'income') {
        pGroup.style.display = 'none';
        bGroup.style.display = 'block';
        document.getElementById('m-beneficiary-account').innerText = t.accountReceived || t.accountPayment || '-';
      } else if (multiAccount) {
        pGroup.style.display = 'block';
        document.getElementById('m-payment-account').innerText = t.accountPayment || '-';
        bGroup.style.display = 'block';
        document.getElementById('m-beneficiary-account').innerText = t.accountReceived || '-';
      } else {
        pGroup.style.display = 'block';
        document.getElementById('m-payment-account').innerText = t.accountPayment || '-';
        bGroup.style.display = 'none';
      }
      
      const statusEl = document.getElementById('m-status');
      const isCleared = t.cleared !== false;
      statusEl.innerText = isCleared ? 'Cleared' : 'Uncleared';
      statusEl.style.color = isCleared ? '#10b981' : '#f59e0b';

      const clearBtn = document.getElementById('m-clear-btn');
      if (clearBtn) {
        clearBtn.style.display = isCleared ? 'none' : 'flex';
        clearBtn.onclick = () => confirmClear();
      }

      const calcEl = document.getElementById('m-calculation');
      if (t.qty && t.qty > 0) {
        calcEl.style.display = 'block';
        let formula = `(${t.qty} x Rp ${t.amount.toLocaleString('id-ID')})`;
        if (t.discount > 0) formula += ` - Rp ${t.discount.toLocaleString('id-ID')}`;
        if (t.fee > 0) formula += ` + Rp ${t.fee.toLocaleString('id-ID')}`;
        formula += ` = Rp ${t.total.toLocaleString('id-ID')}`;
        calcEl.innerText = formula;
      } else {
        calcEl.style.display = 'none';
      }

      // Description
      const descBox = document.getElementById('m-desc-box');
      if (t.description) {
        descBox.style.display = 'block';
        document.getElementById('m-description').innerText = t.description;
      } else {
        descBox.style.display = 'none';
      }

      // Chips
      const chipBox = document.getElementById('m-chips');
      chipBox.innerHTML = '';
      if (t.tags) t.tags.forEach(tag => {
        chipBox.innerHTML += `<div class="chip" style="background:rgba(139,92,246,0.1); color:var(--accent); font-size:0.65rem; padding:0.2rem 0.5rem; border-radius:1rem;">${tag}</div>`;
      });
      if (t.projects) t.projects.forEach(p => {
        chipBox.innerHTML += `<div class="chip" style="background:rgba(16,185,129,0.1); color:#10b981; font-size:0.65rem; padding:0.2rem 0.5rem; border-radius:1rem;">#${p}</div>`;
      });
      if (chipBox.innerHTML === '') chipBox.innerHTML = '<span style="opacity:0.5; font-size:0.75rem;">-</span>';
      
      // Receipt
      const receiptBox = document.getElementById('m-receipt-box');
      const receiptImg = document.getElementById('m-receipt-img');
      if (t.receipt) {
        receiptBox.style.display = 'block';
        receiptImg.src = t.receipt;
      } else {
        receiptBox.style.display = 'none';
      }

      detailModal.style.display = 'flex';
      lucide.createIcons();
    }

    document.getElementById('close-modal-btn').onclick = () => detailModal.style.display = 'none';

    function confirmClear() {
      if (!activeTx) return;
      let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      const idx = txs.findIndex(t => t.id === activeTx.id);
      if (idx !== -1) {
        txs[idx].cleared = true;
        localStorage.setItem('transactions', JSON.stringify(txs));
        if (typeof showToast === 'function') showToast('Transaction marked as Cleared!', 'success', 'check-circle');
        detailModal.style.display = 'none';
        refreshHistory();
      }
    }

    document.getElementById('m-delete').onclick = () => {
      if (!activeTx || !activeTx.id) { detailModal.style.display = 'none'; return; }
      if(typeof showConfirm === 'function') {
        showConfirm('Are you sure you want to delete this transaction?', () => {
          let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
          txs = txs.filter(t => t.id !== activeTx.id);
          localStorage.setItem('transactions', JSON.stringify(txs));
          detailModal.style.display = 'none';
          if (typeof showToast === 'function') showToast('Transaction deleted successfully', 'success', 'trash-2');
          refreshHistory();
        });
      } else {
        if (!confirm('Are you sure you want to delete this transaction?')) return;
        let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
        txs = txs.filter(t => t.id !== activeTx.id);
        localStorage.setItem('transactions', JSON.stringify(txs));
        detailModal.style.display = 'none';
        if (typeof showToast === 'function') showToast('Transaction deleted successfully', 'success', 'trash-2');
        refreshHistory();
      }
    };

    document.getElementById('m-duplicate').onclick = () => {
      window.location.href = `transaction.html?mode=duplicate&id=${activeTx.id}`;
    };

    document.getElementById('m-edit').onclick = () => {
      window.location.href = `transaction.html?mode=edit&id=${activeTx.id}`;
    };

    searchInput.oninput = (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { renderList(mainTxs); return; }
      const filtered = mainTxs.filter(t => {
        const pool = [
          t.name, t.merchant, t.category, t.type, t.description, t.author, t.currency, t.scale, t.sku,
          t.accountPayment, t.accountReceived,
          ...(t.tags || []), ...(t.projects || []),
          t.amount.toString(), (t.cleared ? 'cleared' : 'uncleared')
        ].map(s => (s || '').toLowerCase());
        return pool.some(s => s.includes(q));
      });
      renderList(filtered);
    };

    document.getElementById('filter-toggle').onclick = () => {
       const panel = document.getElementById('filter-panel');
       panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    };

    window.onclick = (e) => { if (e.target === detailModal) detailModal.style.display = 'none'; };

    refreshHistory();

    // URL parameter for deep-linking
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'uncleared') {
      searchInput.value = 'uncleared';
      // Trigger fuzzy search
      const q = 'uncleared';
      const filtered = mainTxs.filter(t => {
        const pool = [
          t.name, t.merchant, t.category, t.type, t.description, t.author, t.currency, t.scale, t.sku,
          t.accountPayment, t.accountReceived,
          ...(t.tags || []), ...(t.projects || []),
          t.amount.toString(), (t.cleared ? 'cleared' : 'uncleared')
        ].map(s => (s || '').toLowerCase());
        return pool.some(s => s.includes(q));
      });
      renderList(filtered);
    }
  </script>
</body>
</html>
