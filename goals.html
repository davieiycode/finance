<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals - Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .goal-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
    }
    .goal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .goal-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(14, 165, 233, 0.1); color: #0ea5e9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .progress-track { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #0ea5e9, #38bdf8); transition: width 0.8s; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .stat-val { font-weight: 700; color: var(--text-primary); font-size: 0.9375rem; }
    .f-group { margin-bottom: 1.25rem; }
    .f-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; color: var(--text-primary); font-size: 0.9375rem; outline: none; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <header class="header" style="margin-bottom: 2rem; border-bottom: none;">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button onclick="window.location.href='index.html'" style="background: none; border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center;">
          <i data-lucide="chevron-left"></i>
        </button>
        <h1 style="font-size: 1.5rem; font-weight: 800;">My Goals</h1>
      </div>
      <button onclick="showModal()" style="background: #0ea5e9; border: none; width: 40px; height: 40px; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="plus"></i>
      </button>
    </header>

    <div id="goals-list">
      <!-- Dynamic Goals -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(14, 165, 233, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="target" style="width: 40px; height: 40px; color: #0ea5e9;"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">Dream Bigger</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">Create saving goals and track your progress towards your dreams.</p>
    </div>
  </div>

  <!-- Add Goal Modal -->
  <div id="goal-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-card" style="padding: 1.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 style="font-weight: 800;">Set a Goal</h3>
        <button onclick="closeModal()" class="close-btn"><i data-lucide="x"></i></button>
      </div>
      
      <div class="f-group">
        <label class="f-label">Goal Name</label>
        <input type="text" id="f-name" class="f-input" placeholder="e.g. New Macbook Air M3">
      </div>

      <div class="f-group">
        <label class="f-label">Target Amount (Rp)</label>
        <input type="number" id="f-target" class="f-input" placeholder="e.g. 25000000">
      </div>

      <div class="f-group">
        <label class="f-label">Current Savings (Rp)</label>
        <input type="number" id="f-saved" class="f-input" placeholder="e.g. 5000000">
      </div>

      <div class="f-group">
        <label class="f-label">Due Date</label>
        <input type="date" id="f-due" class="f-input">
      </div>

      <div class="f-group">
        <label class="f-label">Note</label>
        <input type="text" id="f-note" class="f-input" placeholder="e.g. For work and creative design">
      </div>

      <button onclick="saveGoal()" style="width: 100%; background: #0ea5e9; color: white; border: none; padding: 1.1rem; border-radius: 1rem; font-weight: 800; cursor: pointer;">Add Goal</button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    let goals = JSON.parse(localStorage.getItem('goals') || '[]');

    function refreshList() {
      const list = document.getElementById('goals-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      
      if (goals.length === 0) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'none';
      }

      goals.forEach((g, idx) => {
        const perc = Math.min((g.saved / g.target) * 100, 100);
        const card = document.createElement('div');
        card.className = 'goal-card';
        card.innerHTML = `
          <div class="goal-header">
            <div class="goal-icon"><i data-lucide="mountain"></i></div>
            <div style="flex: 1;">
              <div style="font-weight: 800; font-size: 1.125rem;">${g.name}</div>
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.2rem;">
                 ${g.dueDate ? `<div style="font-size: 0.65rem; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600;">Due: ${g.dueDate}</div>` : ''}
                 ${g.note ? `<div style="font-size: 0.65rem; color: var(--text-secondary); font-style: italic;">"${g.note}"</div>` : ''}
              </div>
              <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">${Math.round(perc)}% Achieved</div>
            </div>
            <button onclick="deleteGoal(${idx})" style="background: none; border: none; color: #ef4444; opacity: 0.3; cursor: pointer;">
              <i data-lucide="trash-2" style="width: 16px;"></i>
            </button>
          </div>
          
          <div class="stat-row">
            <span>Saved</span>
            <span>Target</span>
          </div>
          <div class="stat-row">
            <span class="stat-val">Rp ${g.saved.toLocaleString('id-ID')}</span>
            <span class="stat-val">Rp ${g.target.toLocaleString('id-ID')}</span>
          </div>

          <div class="progress-track"><div class="progress-bar" style="width: ${perc}%;"></div></div>
          
          <div style="text-align: center; margin-top: 1rem;">
             <button onclick="addFunds(${idx})" style="background: rgba(14, 165, 233, 0.1); color: #0ea5e9; border: none; padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.75rem; cursor: pointer;">
                + Add Savings
             </button>
          </div>
        `;
        list.appendChild(card);
      });
      lucide.createIcons();
    }

    function showModal() { document.getElementById('goal-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('goal-modal').style.display = 'none'; }

    function saveGoal() {
      const target = parseInt(document.getElementById('f-target').value);
      const saved = parseInt(document.getElementById('f-saved').value) || 0;
      const dueDate = document.getElementById('f-due').value;
      const note = document.getElementById('f-note').value;
      
      if (!name || !target) { alert('Please fill missing fields'); return; }
      goals.push({ name, target, saved, dueDate, note });
      localStorage.setItem('goals', JSON.stringify(goals));
      closeModal();
      refreshList();
    }

    function addFunds(idx) {
      const amt = parseInt(prompt("Amount to add (Rp):"));
      if (amt) {
        goals[idx].saved += amt;
        localStorage.setItem('goals', JSON.stringify(goals));
        refreshList();
      }
    }

    function deleteGoal(idx) {
      if (!confirm('Cancel this goal?')) return;
      goals.splice(idx, 1);
      localStorage.setItem('goals', JSON.stringify(goals));
      refreshList();
    }

    refreshList();
  </script>
</body>
</html>
