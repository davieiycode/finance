<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expansion Destinations - Jurney</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .goal-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
    }
    .goal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .goal-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(14, 165, 233, 0.1); color: #0ea5e9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .progress-track { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin: 1rem 0; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #0ea5e9, #38bdf8); transition: width 0.8s; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .stat-val { font-weight: 700; color: var(--text-primary); font-size: 0.9375rem; }
    .f-group { margin-bottom: 1.25rem; }
    .f-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; color: var(--text-primary); font-size: 0.9375rem; outline: none; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <div class="sticky-nav">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button onclick="window.location.href='index.html'" class="back-btn"><i data-lucide="chevron-left"></i></button>
          <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Destinations</h1>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button onclick="toggleSearch()" class="back-btn"><i data-lucide="search"></i></button>
          <button onclick="showModal()" class="back-btn" style="background: #0ea5e9; border-color: #0ea5e9; color: white;"><i data-lucide="plus"></i></button>
        </div>
      </header>

      <div id="search-container" style="position: relative; display: none; transform-origin: top; animation: slideInSearch 0.3s ease-out;">
        <i data-lucide="search" style="position: absolute; left: 1rem; top: 0.8rem; width: 18px; color: var(--text-secondary);"></i>
        <input type="text" id="master-search" class="f-input" placeholder="Locate coordinates..." style="padding-left: 2.75rem;" oninput="refreshList(this.value)">
      </div>
    </div>

    <style>
      @keyframes slideInSearch { from { opacity: 0; transform: scaleY(0); } to { opacity: 1; transform: scaleY(1); } }
    </style>

    <script>
      window.toggleSearch = () => {
        const s = document.getElementById('search-container');
        const inp = document.getElementById('master-search');
        if (s.style.display === 'none') {
          s.style.display = 'block';
          inp.focus();
        } else {
          s.style.display = 'none';
          inp.value = '';
          refreshList('');
        }
      };
    </script>

    <div id="goals-list">
      <!-- Dynamic Goals -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(14, 165, 233, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="target" style="width: 40px; height: 40px; color: #0ea5e9;"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">Uncharted Horizons</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">Create saving goals and track your progress towards your dreams.</p>
    </div>
  </div>

  <!-- Add Goal Modal -->
  <div id="goal-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-card" style="padding: 1.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 id="modal-title" style="font-weight: 800;">Plot New Course</h3>
        <button onclick="closeModal()" class="close-btn"><i data-lucide="x"></i></button>
      </div>
      
      <div class="f-group">
        <label class="f-label">Goal Name</label>
        <input type="text" id="f-name" class="f-input" placeholder="e.g. New Macbook Air M3">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="f-group">
          <label class="f-label">Target (Rp)</label>
          <input type="number" id="f-target" class="f-input" placeholder="0">
        </div>
        <div class="f-group">
          <label class="f-label">Initial (Rp)</label>
          <input type="number" id="f-saved" class="f-input" placeholder="0">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="f-group">
          <label class="f-label">Due Date</label>
          <input type="date" id="f-due" class="f-input">
        </div>
        <div class="f-group">
          <label class="f-label">Status</label>
          <select id="f-status" class="f-input">
            <option value="In Progress">In Progress</option>
            <option value="Achieved">Achieved</option>
            <option value="Paused">Paused</option>
          </select>
        </div>
      </div>

      <div class="f-group">
        <label class="f-label">Note</label>
        <input type="text" id="f-note" class="f-input" placeholder="Optional details...">
      </div>

      <input type="hidden" id="editing-id">
      <button onclick="saveGoal()" style="width: 100%; background: #0ea5e9; color: white; border: none; padding: 1.1rem; border-radius: 1rem; font-weight: 800; cursor: pointer;">Save Goal</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    let goals = JSON.parse(localStorage.getItem('goals') || '[]');

    function refreshList(query = '') {
      const list = document.getElementById('goals-list');
      const empty = document.getElementById('empty-state');
      const q = query.toLowerCase();
      list.innerHTML = '';
      
      const filtered = goals.filter(g => 
        (g.name || "").toLowerCase().includes(q) || 
        (g.note || "").toLowerCase().includes(q)
      );

      if (filtered.length === 0) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'none';
      }

      filtered.forEach((g, idx) => {
        const perc = Math.min(((g.saved || 0) / (g.target || 1)) * 100, 100);
        const card = document.createElement('div');
        card.className = 'goal-card';
        card.innerHTML = `
          <div class="goal-header">
            <div class="goal-icon" onclick="editGoal('${g.id || idx}')"><i data-lucide="${g.status === 'Achieved' ? 'check-circle' : 'mountain'}"></i></div>
            <div style="flex: 1;" onclick="editGoal('${g.id || idx}')">
              <div style="font-weight: 800; font-size: 1.125rem;">${g.name}</div>
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.2rem;">
                 ${g.dueDate ? `<div style="font-size: 0.65rem; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600;">Due: ${g.dueDate}</div>` : ''}
                 <div style="font-size: 0.65rem; color: #0ea5e9; background: rgba(14, 165, 233, 0.1); padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600;">${g.status || 'In Progress'}</div>
              </div>
            </div>
            <button onclick="deleteGoal('${g.id || idx}')" style="background: none; border: none; color: #ef4444; opacity: 0.3; cursor: pointer;">
              <i data-lucide="trash-2" style="width: 16px;"></i>
            </button>
          </div>
          
          <div class="stat-row">
            <span>Saved</span>
            <span>Target</span>
          </div>
          <div class="stat-row">
            <span class="stat-val">Rp ${(g.saved || 0).toLocaleString('id-ID')}</span>
            <span class="stat-val">Rp ${(g.target || 0).toLocaleString('id-ID')}</span>
          </div>

          <div class="progress-track"><div class="progress-bar" style="width: ${perc}%; background: ${g.status === 'Achieved' ? '#10b981' : ''};"></div></div>
          
          <div style="display:flex; gap:1rem; margin-top: 1rem;">
             <button onclick="addFunds('${g.id || idx}')" style="flex:1; background: rgba(14, 165, 233, 0.1); color: #0ea5e9; border: none; padding: 0.6rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.75rem; cursor: pointer;">
                + Add Savings
             </button>
             <button onclick="editGoal('${g.id || idx}')" style="flex:1; background: rgba(255,255,255,0.05); color: var(--text-secondary); border: none; padding: 0.6rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.75rem; cursor: pointer;">
                Modify Goal
             </button>
          </div>
        `;
        list.appendChild(card);
      });
      if(window.lucide) lucide.createIcons();
    }

    function showModal() { 
      document.getElementById('modal-title').innerText = 'Set a Goal';
      document.getElementById('editing-id').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-target').value = '';
      document.getElementById('f-saved').value = '';
      document.getElementById('f-note').value = '';
      document.getElementById('goal-modal').style.display = 'flex'; 
    }

    function editGoal(id) {
       const g = goals.find(x => (x.id || '') === id) || goals[id];
       if(!g) return;
       document.getElementById('modal-title').innerText = 'Update Goal';
       document.getElementById('editing-id').value = g.id || '';
       document.getElementById('f-name').value = g.name;
       document.getElementById('f-target').value = g.target;
       document.getElementById('f-saved').value = g.saved;
       document.getElementById('f-due').value = g.dueDate || '';
       document.getElementById('f-status').value = g.status || 'In Progress';
       document.getElementById('f-note').value = g.note || '';
       document.getElementById('goal-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('goal-modal').style.display = 'none'; }

    function saveGoal() {
      const eid = document.getElementById('editing-id').value;
      const name = document.getElementById('f-name').value;
      const target = parseInt(document.getElementById('f-target').value);
      const saved = parseInt(document.getElementById('f-saved').value) || 0;
      const dueDate = document.getElementById('f-due').value;
      const note = document.getElementById('f-note').value;
      const status = document.getElementById('f-status').value;
      
      if (!name || !target) { alert('Please fill missing fields'); return; }

      const gData = {
        id: eid || 'GOAL-' + Date.now(),
        name, target, saved, dueDate, note, status,
        updateTime: new Date().toISOString()
      };

      if (eid) {
        const idx = goals.findIndex(x => x.id === eid);
        if(idx >= 0) goals[idx] = gData;
      } else {
        goals.push(gData);
      }

      localStorage.setItem('goals', JSON.stringify(goals));
      closeModal();
      refreshList();
      if(window.showToast) showToast('Goal saved!', 'success', 'target');
    }

    function addFunds(id) {
      const idx = goals.findIndex(x => (x.id || '') === id);
      const amt = parseInt(prompt("Amount to add (Rp):"));
      if (amt && idx >= 0) {
        goals[idx].saved += amt;
        if(goals[idx].saved >= goals[idx].target) goals[idx].status = 'Achieved';
        localStorage.setItem('goals', JSON.stringify(goals));
        refreshList();
        if(window.showToast) showToast('Savings added!', 'success', 'piggy-bank');
      }
    }

    function deleteGoal(id) {
      const idx = goals.findIndex(x => (x.id || '') === id);
      const action = () => {
        if(idx >= 0) goals.splice(idx, 1);
        else goals.splice(id, 1);
        localStorage.setItem('goals', JSON.stringify(goals));
        refreshList();
        if(typeof showToast === 'function') showToast('Goal removed.', 'success', 'trash-2');
      };

      if(typeof showConfirm === 'function') {
        showConfirm('Remove this goal?', action);
      } else {
        if (confirm('Remove this goal?')) action();
      }
    }

    refreshList();
  </script>
</body>
</html>
  </script>
</body>
</html>
