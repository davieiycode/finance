<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outpost Roster - Jurney</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="theme.js"></script>
  <style>
    :root {
      --violet: var(--accent);
      --violet-soft: rgba(139, 92, 246, 0.15);
      --bg-darker: var(--bg-secondary);
    }

    .bank-card {
      position: relative;
      height: 190px;
      border-radius: 1.5rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .bank-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .bank-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.4);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 1;
    }

    .card-logo {
      width: 64px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 2;
    }

    .card-logo img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }

    .card-logo-placeholder {
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--violet);
      letter-spacing: -0.02em;
    }

    .card-meta {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }

    .card-status-label {
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 30px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);
      letter-spacing: 0.05em;
    }

    .card-type-label {
      font-size: 0.65rem;
      font-weight: 700;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-middle {
      z-index: 1;
      margin: 1.5rem 0 auto;
    }

    .card-number {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1.125rem;
      letter-spacing: 0.12em;
      opacity: 0.95;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 1;
    }

    .card-holder {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-balance {
      font-size: 1.25rem;
      font-weight: 800;
      text-align: right;
    }

    /* Core Layout Styles (Restored) */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(25px);
      z-index: 1000; display: none; overflow-y: auto;
    }
    .modal-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; background: var(--bg-darker); }
    
    .modal-header {
      padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: var(--bg-darker);
    }

    .modal-tabs {
       display: flex; background: var(--glass); padding: 0.25rem; border-radius: 0.75rem; margin: 1rem 1.5rem; gap: 0.25rem;
    }
    .modal-tab {
       flex: 1; padding: 0.6rem; border-radius: 0.6rem; border: none; background: none; color: var(--text-secondary);
       font-weight: 600; font-size: 0.8125rem; cursor: pointer; transition: all 0.2s;
    }
    .modal-tab.active { 
       background: var(--violet); 
       color: white; 
       box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .view-content { padding: 1.5rem; display: none; flex-direction: column; gap: 1.5rem; }
    .view-content.active { display: flex; }

    /* Analysis View Styles */
    .analysis-hero { text-align: center; padding: 1rem 0; }
    .analysis-balance { font-size: 2.5rem; font-weight: 800; color: var(--text-primary); margin: 0.5rem 0; }
    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .analysis-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; }
    .analysis-label { font-size: 0.65rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; }
    .analysis-value { font-weight: 700; font-size: 1rem; }

    .transaction-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
    .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0.75rem; }

    /* Form Styles */
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.875rem 1rem; color: var(--text-primary); outline: none; transition: all 0.3s; }
    .f-input:focus { border-color: var(--violet); }
    .status-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .status-btn { padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text-primary); font-weight: 600; cursor: pointer; }
    .status-btn.active { background: var(--violet); border-color: var(--violet); }

    .btn-violet { background: var(--violet); color: var(--text-primary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <div class="sticky-nav">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="back-btn" onclick="window.location.href='index.html'">
            <i data-lucide="chevron-left"></i>
          </button>
          <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Outpost Roster</h1>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button onclick="toggleSearch()" class="back-btn">
            <i data-lucide="search" style="width: 18px;"></i>
          </button>
          <button class="back-btn" onclick="openModal(null, 'form')" style="background: var(--violet); border-color: var(--violet); color: white;">
            <i data-lucide="plus"></i>
          </button>
        </div>
      </header>

      <div id="search-container" style="position: relative; display: none; transform-origin: top; animation: slideDown 0.3s ease-out;">
        <i data-lucide="search" style="position: absolute; left: 1rem; top: 0.8rem; width: 18px; color: var(--text-secondary);"></i>
        <input type="text" id="master-search" class="f-input" placeholder="Scan outposts..." style="padding-left: 2.75rem;" oninput="renderAccounts(this.value)">
      </div>
    </div>

    <style>
      @keyframes slideDown { from { opacity: 0; transform: scaleY(0); } to { opacity: 1; transform: scaleY(1); } }
    </style>

    <script>
      window.toggleSearch = () => {
        const s = document.getElementById('search-container');
        const inp = document.getElementById('master-search');
        if (s.style.display === 'none') {
          s.style.display = 'block';
          inp.focus();
        } else {
          s.style.display = 'none';
          inp.value = '';
          renderAccounts('');
        }
      };
    </script>

    <div id="account-list"></div>
  </div>

  <!-- Account Modal -->
  <div id="account-modal" class="modal-backdrop">
    <div class="modal-container">
      <header class="modal-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button style="background:none; border:none; color:var(--text-primary); cursor:pointer;" onclick="closeModal()"><i data-lucide="x"></i></button>
          <span id="m-title" style="font-weight: 700; font-size: 1.125rem; color: var(--text-primary);">Account</span>
        </div>
        <div id="header-actions" style="display: flex; gap: 0.5rem;">
          <!-- Save button only for form mode -->
        </div>
      </header>

      <div class="modal-tabs" id="modal-tabs">
         <button class="modal-tab active" data-view="analysis">Analysis</button>
         <button class="modal-tab" data-view="form">Settings</button>
      </div>

      <!-- Analysis View -->
      <div id="view-analysis" class="view-content active">
         <div class="analysis-hero">
            <div class="analysis-label">Available Balance</div>
            <div id="ana-balance" class="analysis-balance">Rp 0</div>
            <div id="ana-meta" style="font-size: 0.8125rem; color: var(--violet); font-weight: 600;">Managed by Owner</div>
         </div>

         <div class="analysis-grid">
            <div class="analysis-card">
               <div class="analysis-label">Internal In</div>
               <div id="ana-in" class="analysis-value" style="color: #10b981;">+ Rp 0</div>
            </div>
            <div class="analysis-card">
               <div class="analysis-label">Internal Out</div>
               <div id="ana-out" class="analysis-value" style="color: #ef4444;">- Rp 0</div>
            </div>
         </div>

         <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
               <h3 style="font-size: 0.875rem; font-weight: 700; color: var(--text-primary);">Transaction History</h3>
               <span style="font-size: 0.75rem; color: var(--text-secondary);">Last 30 Days</span>
            </div>
            <div id="ana-tx-list" class="transaction-list"></div>
         </section>
      </div>

      <!-- Form View -->
      <div id="view-form" class="view-content">
        <div class="form-group">
          <label class="form-label">Status</label>
          <div class="status-group">
            <button type="button" class="status-btn active" data-status="Active">Active</button>
            <button type="button" class="status-btn" data-status="Closed">Closed</button>
            <button type="button" class="status-btn" data-status="Frozen">Frozen</button>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Type</label><select class="f-input" id="acc-type"><option>Bank</option><option>E-Wallet</option><option>Cash</option></select></div>
        <div class="form-group"><label class="form-label">Name</label><input type="text" id="acc-name-input" class="f-input"></div>
        <div class="form-group"><label class="form-label">Provider</label><input type="text" id="acc-provider" class="f-input"></div>
        <div class="form-group"><label class="form-label">Owner</label><input type="text" id="acc-owner" class="f-input" placeholder="e.g. Personal, Family, Business"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group"><label class="form-label">Number / ID</label><input type="text" id="acc-id" class="f-input"></div>
          <div class="form-group"><label class="form-label">Branch / Location</label><input type="text" id="acc-location" class="f-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Card Expiry</label><input type="month" id="acc-card-expiry" class="f-input"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group"><label class="form-label">Opening Balance</label><input type="number" id="acc-balance-init" class="f-input" placeholder="Rp 0"></div>
          <div class="form-group"><label class="form-label">Opening Date</label><input type="date" id="acc-date" class="f-input"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Card Color</label>
            <input type="color" id="acc-color" class="f-input" style="height: 50px; padding: 4px; cursor: pointer;">
          </div>
          <div class="form-group">
            <label class="form-label">Logo Upload</label>
            <button type="button" class="f-input" onclick="document.getElementById('acc-logo-file').click()" style="text-align: left; position: relative;">
               <span id="logo-status">Upload Image</span>
               <i data-lucide="image" style="position: absolute; right: 1rem; width: 16px; top: 1rem;"></i>
            </button>
            <input type="file" id="acc-logo-file" style="display: none;" accept="image/*" onchange="handleLogoUpload(this)">
            <input type="hidden" id="acc-logo-data">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Logo URL (Alternative)</label>
          <input type="text" id="acc-logo-url" class="f-input" placeholder="https://..." oninput="updateLogoLink(this.value)">
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea id="acc-notes" class="f-input" style="min-height: 80px;"></textarea></div>
      </div>
    </div>
  </div>

  <!-- Merge Picker Bottom Sheet -->
  <div id="merge-picker-backdrop" onclick="closeMergePicker(event)">
    <div class="merge-picker-sheet" onclick="event.stopPropagation()">
      <div class="merge-picker-header">
        <div>
          <div style="font-weight:800; font-size:1rem; color:white;">Merge Into&hellip;</div>
          <div id="merge-source-hint" style="font-size:0.75rem; color:var(--text-secondary); margin-top:0.2rem;"></div>
        </div>
        <button onclick="closeMergePicker()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:0.25rem;">
          <i data-lucide="x" style="width:20px;"></i>
        </button>
      </div>
      <div class="merge-search-wrap" style="position: relative; padding: 1rem 1.5rem 0.75rem;">
        <i data-lucide="search" style="position: absolute; left: 2.25rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 16px; pointer-events: none;"></i>
        <input type="text" id="merge-search-input" placeholder="Search accounts..." oninput="filterMergeList(this.value)" autocomplete="off"
               style="width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 0.75rem 1rem 0.75rem 2.75rem; color: white; font-size: 0.9375rem; outline: none;">
      </div>
      <div class="merge-list" id="merge-list" style="max-height: 42vh; overflow-y: auto; padding: 0 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem;"></div>
    </div>
  </div>

  <style>
    #merge-picker-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      z-index: 2000; display: none; align-items: flex-end; justify-content: center; padding: 1rem;
    }
    #merge-picker-backdrop.open { display: flex; animation: fadeInBackdrop 0.2s ease; }
    .merge-picker-sheet {
      width: 100%; max-width: 500px; background: #0f0f12; border: 1px solid var(--border);
      border-radius: 1.75rem 1.75rem 1rem 1rem; overflow: hidden;
      animation: slideUpSheet 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .merge-picker-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .merge-item {
      display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1rem; border-radius: 1rem;
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
    }
    .merge-item:hover { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.2); }
    .merge-item-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--violet-soft); color: var(--violet); display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
    @keyframes fadeInBackdrop { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUpSheet { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>

  <script>
    lucide.createIcons();
    let accounts = JSON.parse(localStorage.getItem('accounts'));
    if (!accounts || accounts.length === 0) {
      accounts = [
        { id: 1, name: 'Bank Mandiri', type: 'Savings', balance: 25750800, number: '124-00-****', status: 'Active', color: '#053d71', logo: '' },
        { id: 2, name: 'BCA Private', type: 'Savings', balance: 12400500, number: '802-11-****', status: 'Active', color: '#00479b', logo: '' },
        { id: 3, name: 'Gopay', type: 'E-Wallet', balance: 500000, number: '0812-****', status: 'Frozen', color: '#009dcc', logo: '' }
      ];
      localStorage.setItem('accounts', JSON.stringify(accounts));
    }

    function renderAccounts(query = '') {
      const list = document.getElementById('account-list');
      const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
      const q = query.toLowerCase();
      
      const filtered = accounts.filter(acc => 
        (acc.name || '').toLowerCase().includes(q) || 
        (acc.number || '').toLowerCase().includes(q)
      ).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      
      list.innerHTML = filtered.map(acc => {
        const accName = (acc.name || 'Unnamed Account').toLowerCase();
        // Calculate real-time balance for each card
        const inSum = txs.filter(t => (t.accountReceived || '').toLowerCase() === accName)
                         .reduce((s, t) => s + (t.total || t.amount || 0), 0);
        const outSum = txs.filter(t => (t.accountPayment || '').toLowerCase() === accName)
                          .reduce((s, t) => s + (t.total || t.amount || 0), 0);
        const currentBalance = (acc.balance || 0) + inSum - outSum;

        const cleanId = typeof acc.id === 'string' ? `'${acc.id}'` : acc.id;
        const name = acc.name || 'Unnamed Account';
        const cardColor = acc.color || '#1e293b';
        const logo = acc.logo || '';

        return `
        <div class="bank-card" style="background: linear-gradient(135deg, ${cardColor}, ${cardColor}88);" onclick="openModal(${cleanId}, 'analysis')">
           <div class="card-top">
              <div class="card-logo">
                 ${logo ? `<img src="${logo}" alt="Bank Logo">` : `<span class="card-logo-placeholder">${name.substring(0,2)}</span>`}
              </div>
              <div class="card-meta">
                 <div class="card-status-label" style="color: ${acc.status === 'Active' ? '#10b981' : '#f87171'}">${acc.status}</div>
                 <div class="card-type-label">${acc.type}</div>
              </div>
           </div>
           
           <div class="card-middle">
              <div class="card-number">${acc.number || '**** **** **** ****'}</div>
           </div>
           
           <div class="card-bottom">
              <div class="card-holder">${name}</div>
              <div class="card-balance">Rp ${currentBalance.toLocaleString('id-ID')}</div>
           </div>
        </div>
      `}).join('');
    }

    const modal = document.getElementById('account-modal');
    const tabs = document.querySelectorAll('.modal-tab');
    const contents = document.querySelectorAll('.view-content');
    let activeAcc = null;

    function openModal(id, initialView) {
      activeAcc = id ? accounts.find(a => a.id.toString() === id.toString()) : null;
      document.getElementById('m-title').innerText = activeAcc ? activeAcc.name : 'New Account';
      
      // Toggle tabs visibility for New Account
      document.getElementById('modal-tabs').style.display = id ? 'flex' : 'none';
      switchView(id ? initialView : 'form');

      if (activeAcc) {
         // Populate Analysis
         document.getElementById('ana-balance').innerText = 'Rp ' + activeAcc.balance.toLocaleString('id-ID');
         const txsRaw = JSON.parse(localStorage.getItem('transactions') || '[]');
         const txs = txsRaw.map(t => {
           if (t.total === undefined && t.amount !== undefined) {
             t.total = t.amount;
             t.amount = t.price || (t.total / (t.qty || 1));
           }
           return t;
         });
         // Filter txs (mock account linking for now since transactions don't have accountId yet)
         // Filter transactions for this specific account
         const accountTxs = txs.filter(t => 
            (t.accountPayment || '').toLowerCase() === activeAcc.name.toLowerCase() || 
            (t.accountReceived || '').toLowerCase() === activeAcc.name.toLowerCase()
         );

         // Calculate In / Out / Balance
         const inSum = accountTxs.filter(t => (t.accountReceived || '').toLowerCase() === activeAcc.name.toLowerCase())
                                .reduce((s, t) => s + (t.total || t.amount || 0), 0);
         const outSum = accountTxs.filter(t => (t.accountPayment || '').toLowerCase() === activeAcc.name.toLowerCase())
                                 .reduce((s, t) => s + (t.total || t.amount || 0), 0);
         
         const netBalance = (activeAcc.balance || 0) + inSum - outSum;

         document.getElementById('ana-balance').innerText = 'Rp ' + netBalance.toLocaleString('id-ID');
         document.getElementById('ana-in').innerText = '+ Rp ' + inSum.toLocaleString('id-ID');
         document.getElementById('ana-out').innerText = '- Rp ' + outSum.toLocaleString('id-ID');

         const filtered = accountTxs.sort((a,b) => (b.amount || 0) - (a.amount || 0)).slice(0, 10);
         document.getElementById('ana-tx-list').innerHTML = filtered.map(t => {
            const isOut = (t.accountPayment || '').toLowerCase() === activeAcc.name.toLowerCase();
            return `
               <div class="tx-item">
                  <div>
                     <div style="font-weight:600; font-size:0.8125rem; color:var(--text-primary);">${t.merchant || t.name}</div>
                     <div style="font-size:0.65rem; color:var(--text-secondary);">${t.date}</div>
                  </div>
                  <div style="font-weight:700; color:${isOut ? '#ef4444' : '#10b981'}">
                     ${isOut ? '-' : '+'} Rp ${(t.total || t.amount).toLocaleString('id-ID')}
                  </div>
               </div>
            `;
         }).join('') || '<div style="text-align:center; padding:2rem; color:var(--text-secondary); font-size:0.8125rem;">No transactions recorded for this account.</div>';
         
         // Populate Form
         document.getElementById('acc-name-input').value = activeAcc.name;
         document.getElementById('acc-id').value = activeAcc.number;
         document.getElementById('acc-type').value = activeAcc.type;
         document.getElementById('acc-balance-init').value = activeAcc.balance;
         document.getElementById('acc-provider').value = activeAcc.provider || '';
         document.getElementById('acc-owner').value = activeAcc.owner || '';
         document.getElementById('acc-location').value = activeAcc.location || '';
         document.getElementById('acc-card-expiry').value = activeAcc.cardExpiry || '';
         document.getElementById('acc-color').value = activeAcc.color || '#1e293b';
         
         const isBase64 = (activeAcc.logo || '').startsWith('data:image');
         document.getElementById('acc-logo-data').value = isBase64 ? activeAcc.logo : '';
         document.getElementById('acc-logo-url').value = isBase64 ? '' : (activeAcc.logo || '');
         document.getElementById('logo-status').textContent = activeAcc.logo ? (isBase64 ? 'Image Selected' : 'Link Provided') : 'Upload Image';
      } else {
         document.getElementById('acc-name-input').value = '';
         document.getElementById('acc-id').value = '';
         document.getElementById('acc-type').value = 'Bank';
         document.getElementById('acc-balance-init').value = '';
         document.getElementById('acc-provider').value = '';
         document.getElementById('acc-owner').value = '';
         document.getElementById('acc-location').value = '';
         document.getElementById('acc-card-expiry').value = '';
         document.getElementById('acc-color').value = '#1e293b';
         document.getElementById('acc-logo-data').value = '';
         document.getElementById('acc-logo-url').value = '';
         document.getElementById('logo-status').textContent = 'Upload Image';
         document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.status === 'Active'));
      }

      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }

    function switchView(view) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.view === view));
      contents.forEach(c => c.classList.toggle('active', c.id === 'view-' + view));
      
      const actions = document.getElementById('header-actions');
      if (view === 'form') {
         actions.innerHTML = `
           ${activeAcc ? `<button class="btn-cancel" style="color:var(--accent); border-color:rgba(139,92,246,0.2); background:none; padding:0 0.5rem;" onclick="showMergePicker()" title="Merge"><i data-lucide="git-merge" style="width:18px;"></i></button>` : ''}
           ${activeAcc ? `<button class="btn-cancel" style="color:#ef4444; border-color:rgba(239,68,68,0.2); background:none; padding:0 0.5rem;" onclick="deleteAccount()"><i data-lucide="trash-2" style="width:18px;"></i></button>` : ''}
           <button class="btn-violet" onclick="save()">Save</button>
         `;
      } else {
         actions.innerHTML = '';
      }
      lucide.createIcons();
    }

    tabs.forEach(t => t.onclick = () => switchView(t.dataset.view));

    function showMergePicker() {
      if (!activeAcc) return;
      document.getElementById('merge-source-hint').textContent = `All balance and transactions of "${activeAcc.name}" will move to the selected account.`;
      document.getElementById('merge-search-input').value = '';
      populateMergeList('');
      document.getElementById('merge-picker-backdrop').classList.add('open');
      setTimeout(() => document.getElementById('merge-search-input').focus(), 100);
      lucide.createIcons();
    }

    function populateMergeList(query) {
      const others = accounts.filter(a => a.id !== activeAcc.id && (a.name || '').toLowerCase().includes(query.toLowerCase()));
      const list = document.getElementById('merge-list');
      
      if (others.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-secondary); font-size:0.875rem;">No other accounts found.</div>`;
        return;
      }
      
      list.innerHTML = others.map(a => `
        <div class="merge-item" onclick="confirmMerge(${a.id})">
          <div class="merge-item-icon" style="background:${a.color}22; color:${a.color}">${a.name.substring(0,2)}</div>
          <div style="flex:1;">
            <div style="font-weight:700; color:white; font-size:0.9375rem;">${a.name}</div>
            <div style="font-size:0.725rem; color:var(--text-secondary);">${a.type}</div>
          </div>
          <i data-lucide="chevron-right" style="width:16px; color:var(--accent); opacity:0.5;"></i>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function filterMergeList(q) { populateMergeList(q); }

    function closeMergePicker(e) {
      if (e && e.target !== document.getElementById('merge-picker-backdrop') && e.target.tagName !== 'BUTTON') return;
      document.getElementById('merge-picker-backdrop').classList.remove('open');
    }

    function confirmMerge(targetId) {
      const target = accounts.find(a => a.id === targetId);
      if (!target) return;
      
      closeMergePicker();
      
      const doTheMerge = () => {
        let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
        txs.forEach(t => {
          if (t.accountPayment === activeAcc.name) t.accountPayment = target.name;
          if (t.accountReceived === activeAcc.name) t.accountReceived = target.name;
        });
        localStorage.setItem('transactions', JSON.stringify(txs));
        
        accounts = accounts.filter(a => a.id !== activeAcc.id);
        localStorage.setItem('accounts', JSON.stringify(accounts));
        
        closeModal();
        renderAccounts('');
        if(typeof showToast === 'function') showToast('Accounts merged successfully!', 'success', 'git-merge');
      };

      if (typeof showConfirm === 'function') {
        showConfirm(`Merge "${activeAcc.name}" INTO "${target.name}"? This cannot be undone.`, doTheMerge);
      } else {
        if (confirm(`Merge "${activeAcc.name}" INTO "${target.name}"?`)) doTheMerge();
      }
    }

    function closeModal() { modal.style.display = 'none'; document.body.style.overflow = 'auto'; }
    
    function save() {
      const name = document.getElementById('acc-name-input').value;
      if (!name) { 
        if(typeof showToast === 'function') showToast('Account name is required', 'error');
        return; 
      }
      
      const newAcc = {
        id: activeAcc ? activeAcc.id : Date.now(),
        name: name,
        type: document.getElementById('acc-type').value,
        provider: document.getElementById('acc-provider').value,
        owner: document.getElementById('acc-owner').value,
        number: document.getElementById('acc-id').value,
        location: document.getElementById('acc-location').value,
        cardExpiry: document.getElementById('acc-card-expiry').value,
        balance: parseFloat(document.getElementById('acc-balance-init').value) || 0,
        notes: document.getElementById('acc-notes').value,
        status: document.querySelector('.status-btn.active').dataset.status,
        color: document.getElementById('acc-color').value,
        logo: document.getElementById('acc-logo-url').value || document.getElementById('acc-logo-data').value || '',
        updateTime: new Date().toISOString()
      };

      if (activeAcc) {
        const idx = accounts.findIndex(a => a.id === activeAcc.id);
        accounts[idx] = newAcc;
      } else {
        accounts.push(newAcc);
      }
      
      localStorage.setItem('accounts', JSON.stringify(accounts));
      
      if(typeof showToast === 'function') showToast('Account saved successfully!', 'success');
      closeModal();
      renderAccounts('');
    }
    
    function deleteAccount() {
      showConfirm('Delete this account for good?', () => {
        accounts = accounts.filter(a => a.id !== activeAcc.id);
        localStorage.setItem('accounts', JSON.stringify(accounts));
        closeModal();
        renderAccounts('');
        if(typeof showToast === 'function') showToast('Account deleted successfully!', 'success', 'trash-2');
      });
    }

    function handleLogoUpload(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('acc-logo-data').value = e.target.result;
          document.getElementById('acc-logo-url').value = ''; // Clear URL if image uploaded
          document.getElementById('logo-status').textContent = 'Image Selected';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function updateLogoLink(val) {
      if (val.trim()) {
        document.getElementById('acc-logo-data').value = ''; // Clear uploaded image if URL provided
        document.getElementById('logo-status').textContent = 'Link Provided';
      } else {
        document.getElementById('logo-status').textContent = 'Upload Image';
      }
    }

    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
    });

    renderAccounts();

    // Deep-linking support: auto-open account from URL
    const urlParams = new URLSearchParams(window.location.search);
    const deepId = urlParams.get('id');
    if (deepId) {
      const match = accounts.find(a => a.id.toString() === deepId);
      if (match) {
        setTimeout(() => openModal(match.id, 'analysis'), 500);
      }
    }
  </script>
</body>
</html>
