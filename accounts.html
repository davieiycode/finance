<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Management - Finance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="theme.js"></script>
  <style>
    :root {
      --violet: var(--accent);
      --violet-soft: rgba(139, 92, 246, 0.15);
      --bg-darker: var(--bg-secondary);
    }

    .account-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .account-card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); border-color: var(--violet); }
    .acc-info { display: flex; align-items: center; gap: 1rem; }
    .acc-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-primary); background: var(--border2); }
    
    .modal-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(25px);
      z-index: 1000; display: none; overflow-y: auto;
    }
    .modal-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; background: var(--bg-darker); }
    
    .modal-header {
      padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; background: var(--bg-darker);
    }

    .modal-tabs {
       display: flex; background: var(--glass); padding: 0.25rem; border-radius: 0.75rem; margin: 1rem 1.5rem; gap: 0.25rem;
    }
    .modal-tab {
       flex: 1; padding: 0.6rem; border-radius: 0.6rem; border: none; background: none; color: var(--text-secondary);
       font-weight: 600; font-size: 0.8125rem; cursor: pointer; transition: all 0.2s;
    }
    .modal-tab.active { 
       background: var(--violet); 
       color: white; 
       box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .view-content { padding: 1.5rem; display: none; flex-direction: column; gap: 1.5rem; }
    .view-content.active { display: flex; }

    /* Analysis View Styles */
    .analysis-hero { text-align: center; padding: 1rem 0; }
    .analysis-balance { font-size: 2.5rem; font-weight: 800; color: var(--text-primary); margin: 0.5rem 0; }
    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .analysis-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; }
    .analysis-label { font-size: 0.65rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; }
    .analysis-value { font-weight: 700; font-size: 1rem; }

    .transaction-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
    .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 0.75rem; }

    /* Form Styles */
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.875rem 1rem; color: var(--text-primary); outline: none; transition: all 0.3s; }
    .f-input:focus { border-color: var(--violet); }
    .status-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .status-btn { padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text-primary); font-weight: 600; cursor: pointer; }
    .status-btn.active { background: var(--violet); border-color: var(--violet); }

    .btn-violet { background: var(--violet); color: var(--text-primary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text-secondary); border: none; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; }
    .back-btn { width: 40px; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <header class="header" style="margin-bottom: 2rem;">
      <button class="back-btn" onclick="window.location.href='index.html'">
        <i data-lucide="chevron-left"></i>
      </button>
      <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Accounts</h1>
      <button class="btn-violet" onclick="openModal(null, 'form')" style="font-size: 0.8125rem;">+ New</button>
    </header>

    <div id="account-list"></div>
  </div>

  <!-- Account Modal -->
  <div id="account-modal" class="modal-backdrop">
    <div class="modal-container">
      <header class="modal-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button style="background:none; border:none; color:var(--text-primary); cursor:pointer;" onclick="closeModal()"><i data-lucide="x"></i></button>
          <span id="m-title" style="font-weight: 700; font-size: 1.125rem; color: var(--text-primary);">Account</span>
        </div>
        <div id="header-actions" style="display: flex; gap: 0.5rem;">
          <!-- Save button only for form mode -->
        </div>
      </header>

      <div class="modal-tabs" id="modal-tabs">
         <button class="modal-tab active" data-view="analysis">Analysis</button>
         <button class="modal-tab" data-view="form">Settings</button>
      </div>

      <!-- Analysis View -->
      <div id="view-analysis" class="view-content active">
         <div class="analysis-hero">
            <div class="analysis-label">Available Balance</div>
            <div id="ana-balance" class="analysis-balance">Rp 0</div>
            <div id="ana-meta" style="font-size: 0.8125rem; color: var(--violet); font-weight: 600;">Managed by Owner</div>
         </div>

         <div class="analysis-grid">
            <div class="analysis-card">
               <div class="analysis-label">Internal In</div>
               <div id="ana-in" class="analysis-value" style="color: #10b981;">+ Rp 0</div>
            </div>
            <div class="analysis-card">
               <div class="analysis-label">Internal Out</div>
               <div id="ana-out" class="analysis-value" style="color: #ef4444;">- Rp 0</div>
            </div>
         </div>

         <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
               <h3 style="font-size: 0.875rem; font-weight: 700; color: var(--text-primary);">Transaction History</h3>
               <span style="font-size: 0.75rem; color: var(--text-secondary);">Last 30 Days</span>
            </div>
            <div id="ana-tx-list" class="transaction-list"></div>
         </section>
      </div>

      <!-- Form View -->
      <div id="view-form" class="view-content">
        <div class="form-group">
          <label class="form-label">Status</label>
          <div class="status-group">
            <button type="button" class="status-btn active" data-status="Active">Active</button>
            <button type="button" class="status-btn" data-status="Closed">Closed</button>
            <button type="button" class="status-btn" data-status="Frozen">Frozen</button>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Type</label><select class="f-input" id="acc-type"><option>Bank</option><option>E-Wallet</option><option>Cash</option></select></div>
        <div class="form-group"><label class="form-label">Name</label><input type="text" id="acc-name-input" class="f-input"></div>
        <div class="form-group"><label class="form-label">Provider</label><input type="text" id="acc-provider" class="f-input"></div>
        <div class="form-group"><label class="form-label">Number / ID</label><input type="text" id="acc-id" class="f-input"></div>
        <div class="form-group"><label class="form-label">Opening Balance</label><input type="number" id="acc-balance-init" class="f-input" placeholder="Rp 0"></div>
        <div class="form-group"><label class="form-label">Opening Date</label><input type="date" id="acc-date" class="f-input"></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea id="acc-notes" class="f-input" style="min-height: 80px;"></textarea></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    let accounts = [
      { id: 1, name: 'BNI Bisnis', type: 'Bank', balance: 12450000, number: '172-661-6712', status: 'Active', color: '#8B5CF6' },
      { id: 2, name: 'Pocket Money', type: 'Cash', balance: 1500000, number: 'Wallet', status: 'Active', color: '#10b981' },
      { id: 3, name: 'Gopay', type: 'E-Wallet', balance: 500000, number: '0812-****', status: 'Frozen', color: '#f59e0b' }
    ];

    function renderAccounts() {
      const list = document.getElementById('account-list');
      list.innerHTML = accounts.map(acc => `
        <div class="account-card" onclick="openModal(${acc.id}, 'analysis')">
          <div class="acc-info">
            <div class="acc-icon" style="background:${acc.color}">${acc.name.substring(0,2)}</div>
            <div>
              <div class="acc-name">${acc.name}</div>
              <div class="acc-type">${acc.type} • ${acc.number}</div>
            </div>
          </div>
          <div style="text-align:right;">
             <div style="font-weight:700; color:var(--text-primary);">Rp ${acc.balance.toLocaleString('id-ID')}</div>
             <div style="font-size:0.65rem; color:${acc.status === 'Active' ? '#32D74B' : '#FF453A'}; font-weight:700;">${acc.status}</div>
          </div>
        </div>
      `).join('');
    }

    const modal = document.getElementById('account-modal');
    const tabs = document.querySelectorAll('.modal-tab');
    const contents = document.querySelectorAll('.view-content');
    let activeAcc = null;

    function openModal(id, initialView) {
      activeAcc = id ? accounts.find(a => a.id === id) : null;
      document.getElementById('m-title').innerText = activeAcc ? activeAcc.name : 'New Account';
      
      // Toggle tabs visibility for New Account
      document.getElementById('modal-tabs').style.display = id ? 'flex' : 'none';
      switchView(id ? initialView : 'form');

      if (activeAcc) {
         // Populate Analysis
         document.getElementById('ana-balance').innerText = 'Rp ' + activeAcc.balance.toLocaleString('id-ID');
         const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
         // Filter txs (mock account linking for now since transactions don't have accountId yet)
         const filtered = txs.slice(0, 5); // Show first 5 as placeholder
         document.getElementById('ana-tx-list').innerHTML = filtered.map(t => `
            <div class="tx-item">
               <div>
                  <div style="font-weight:600; font-size:0.8125rem; color:var(--text-primary);">${t.merchant || t.name}</div>
                  <div style="font-size:0.65rem; color:var(--text-secondary);">${t.date}</div>
               </div>
               <div style="font-weight:700; color:${t.type === 'Expense' ? '#ef4444' : '#10b981'}">
                  ${t.type === 'Expense' ? '-' : '+'} Rp ${t.amount.toLocaleString('id-ID')}
               </div>
            </div>
         `).join('') || '<div style="text-align:center; padding:2rem; color:var(--text-secondary); font-size:0.8125rem;">No transactions recorded for this account.</div>';
         
         // Populate Form
         document.getElementById('acc-name-input').value = activeAcc.name;
         document.getElementById('acc-id').value = activeAcc.number;
         document.getElementById('acc-type').value = activeAcc.type;
         document.getElementById('acc-balance-init').value = activeAcc.balance;
      }

      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
      lucide.createIcons();
    }

    function switchView(view) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.view === view));
      contents.forEach(c => c.classList.toggle('active', c.id === 'view-' + view));
      
      const actions = document.getElementById('header-actions');
      if (view === 'form') {
         actions.innerHTML = `<button class="btn-violet" onclick="save()">Save</button>`;
      } else {
         actions.innerHTML = '';
      }
    }

    tabs.forEach(t => t.onclick = () => switchView(t.dataset.view));

    function closeModal() { modal.style.display = 'none'; document.body.style.overflow = 'auto'; }
    function save() { alert('Account updated successfully!'); closeModal(); }

    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
    });

    renderAccounts();
  </script>
</body>
</html>
