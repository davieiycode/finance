<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ration Planner - Jurney</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .budget-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: 0.3s;
    }
    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      margin: 1rem 0 0.5rem 0;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .budget-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .cat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 92, 246, 0.1);
      color: var(--accent);
    }
    .f-group { margin-bottom: 1.25rem; }
    .f-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
    .f-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; color: var(--text-primary); font-size: 0.9375rem; outline: none; transition: 0.2s; }
    .f-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <div class="sticky-nav">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button onclick="window.location.href='index.html'" class="back-btn"><i data-lucide="chevron-left"></i></button>
          <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Ration Planning</h1>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button onclick="toggleSearch()" class="back-btn"><i data-lucide="search"></i></button>
          <button onclick="showAddModal()" class="back-btn" style="background: var(--accent); border-color: var(--accent); color: white;"><i data-lucide="plus"></i></button>
        </div>
      </header>

      <div id="search-container" style="position: relative; display: none; transform-origin: top; animation: slideInSearch 0.3s ease-out;">
        <i data-lucide="search" style="position: absolute; left: 1rem; top: 0.8rem; width: 18px; color: var(--text-secondary);"></i>
        <input type="text" id="master-search" class="f-input" placeholder="Scan supply paths..." style="padding-left: 2.75rem;" oninput="refreshList(this.value)">
      </div>
    </div>

    <style>
      @keyframes slideInSearch { from { opacity: 0; transform: scaleY(0); } to { opacity: 1; transform: scaleY(1); } }
    </style>
    
    <script>
      window.toggleSearch = () => {
        const s = document.getElementById('search-container');
        const inp = document.getElementById('master-search');
        if (s.style.display === 'none') {
          s.style.display = 'block';
          inp.focus();
        } else {
          s.style.display = 'none';
          inp.value = '';
          refreshList('');
        }
      };
    </script>

    <div id="budget-list">
      <!-- Dynamic Budget Cards -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(139, 92, 246, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="pie-chart" style="width: 40px; height: 40px; color: var(--accent);"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">No Budgets Set</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">Track your spending categories by setting monthly limits.</p>
    </div>
  </div>

  <!-- Add Budget Modal -->
  <div id="budget-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-card" style="padding: 1.5rem; max-height:90vh; overflow-y:auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 id="modal-title" style="font-weight: 800;">New Budget</h3>
        <button onclick="closeModal()" class="close-btn"><i data-lucide="x"></i></button>
      </div>
      
      <div class="f-group">
        <label class="f-label">Category</label>
        <select id="f-category" class="f-input" onchange="autoFillCatDetails()">
          <!-- Populated from categories_db -->
        </select>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
         <div class="f-group">
           <label class="f-label">Period</label>
           <select id="f-period" class="f-input">
             <option value="Monthly">Monthly</option>
             <option value="Weekly">Weekly</option>
             <option value="Yearly">Yearly</option>
           </select>
         </div>
         <div class="f-group">
           <label class="f-label">Status</label>
           <select id="f-status" class="f-input">
             <option value="Active">Active</option>
             <option value="Paused">Paused</option>
           </select>
         </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 2fr; gap:1rem;">
         <div class="f-group">
           <label class="f-label">Currency</label>
           <input type="text" id="f-currency" class="f-input" value="IDR">
         </div>
         <div class="f-group">
           <label class="f-label">Limit Amount</label>
           <input type="number" id="f-limit" class="f-input" placeholder="0">
         </div>
      </div>

      <div class="f-group">
        <label class="f-label">Notes</label>
        <textarea id="f-note" class="f-input" style="height:80px; resize:none;" placeholder="Optional notes..."></textarea>
      </div>

      <input type="hidden" id="f-cat-id">
      <input type="hidden" id="f-cat-group">
      <input type="hidden" id="f-cat-type">
      <input type="hidden" id="editing-id">

      <button onclick="saveBudget()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 1.1rem; border-radius: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top:0.5rem;">Set Budget</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    
    let budgets = JSON.parse(localStorage.getItem('budgets') || '[]');
    let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
    const categories_db = JSON.parse(localStorage.getItem('categories_db') || '[]');

    function populateCategories() {
      const sel = document.getElementById('f-category');
      const cats = categories_db.length ? categories_db : [
        { name: 'Food & Beverage', id: 'CAT-FB', group: 'Personal', type: 'Expense' },
        { name: 'Transport', id: 'CAT-TR', group: 'Personal', type: 'Expense' },
        { name: 'Lifestyle', id: 'CAT-LS', group: 'Personal', type: 'Expense' },
        { name: 'Shopping', id: 'CAT-SH', group: 'Personal', type: 'Expense' },
        { name: 'Bills & Utilities', id: 'CAT-BU', group: 'Home', type: 'Expense' }
      ];
      sel.innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
      autoFillCatDetails();
    }

    function autoFillCatDetails() {
      const name = document.getElementById('f-category').value;
      const c = categories_db.find(x => x.name === name) || { id:'', group:'', type:'' };
      document.getElementById('f-cat-id').value = c.id || '';
      document.getElementById('f-cat-group').value = c.group || '';
      document.getElementById('f-cat-type').value = c.type || 'Expense';
    }

    function refreshList(query = '') {
      const list = document.getElementById('budget-list');
      const empty = document.getElementById('empty-state');
      const q = query.toLowerCase();
      list.innerHTML = '';
      
      const filtered = budgets.filter(b => 
        (b.category || "").toLowerCase().includes(q) || 
        (b.notes || "").toLowerCase().includes(q)
      );

      if (filtered.length === 0) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'none';
      }

      filtered.forEach((b, idx) => {
        const now = new Date();
        const monthStr = now.toISOString().substring(0, 7); 
        const spent = txs.filter(t => t.category === b.category && (t.date || "").startsWith(monthStr) && t.type === 'Expense')
                         .reduce((s, t) => s + (t.total || 0), 0);
        
        const limit = b.budget || b.limit || 0;
        const perc = limit > 0 ? Math.min((spent / limit) * 100, 100) : 0;
        const color = perc > 90 ? '#ef4444' : (perc > 70 ? '#f59e0b' : '#22c55e');

        const card = document.createElement('div');
        card.className = 'budget-card';
        card.innerHTML = `
          <div class="budget-info">
            <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;" onclick="editBudget('${b.id || idx}')">
               <div class="cat-icon"><i data-lucide="tag"></i></div>
               <div>
                 <div style="font-weight: 700; font-size: 1rem;">${b.category} <span style="font-size:0.6rem; opacity:0.5; vertical-align:middle;">${b.period || 'Monthly'}</span></div>
                 ${b.notes ? `<div style="font-size: 0.7rem; opacity: 0.6; font-style: italic; margin: 0.1rem 0;">${b.notes}</div>` : ''}
                 <div style="font-size: 0.75rem; color: var(--text-secondary);">${b.currency || 'IDR'} ${spent.toLocaleString()} of ${limit.toLocaleString()}</div>
               </div>
            </div>
            <button onclick="deleteBudget('${b.id || idx}')" style="background: none; border: none; color: #ef4444; opacity: 0.3; cursor: pointer;">
              <i data-lucide="trash-2" style="width: 16px;"></i>
            </button>
          </div>
          <div class="progress-track" onclick="editBudget('${b.id || idx}')">
            <div class="progress-bar" style="width: ${perc}%; background: ${color};"></div>
          </div>
          <div style="display:flex; justify-content: space-between; font-size: 0.7rem; font-weight: 600; margin-top: 0.5rem;" onclick="editBudget('${b.id || idx}')">
             <span style="color: ${color}">${Math.round(perc)}% Used</span>
             <span style="opacity: 0.5;">${b.currency || 'IDR'} ${(limit - spent).toLocaleString()} Left</span>
          </div>
        `;
        list.appendChild(card);
      });
      if(window.lucide) lucide.createIcons();
    }

    function showAddModal() { 
      document.getElementById('modal-title').innerText = 'New Budget';
      document.getElementById('editing-id').value = '';
      document.getElementById('f-limit').value = '';
      document.getElementById('f-note').value = '';
      document.getElementById('budget-modal').style.display = 'flex'; 
    }

    function editBudget(id) {
       const b = budgets.find(x => (x.id || '') === id) || budgets[id];
       if(!b) return;
       document.getElementById('modal-title').innerText = 'Edit Budget';
       document.getElementById('editing-id').value = b.id || '';
       document.getElementById('f-category').value = b.category;
       document.getElementById('f-limit').value = b.budget || b.limit;
       document.getElementById('f-note').value = b.notes || b.note || '';
       document.getElementById('f-period').value = b.period || 'Monthly';
       document.getElementById('f-status').value = b.status || 'Active';
       document.getElementById('f-currency').value = b.currency || 'IDR';
       autoFillCatDetails();
       document.getElementById('budget-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('budget-modal').style.display = 'none'; }

    function saveBudget() {
      const eid = document.getElementById('editing-id').value;
      const cat = document.getElementById('f-category').value;
      const limit = parseFloat(document.getElementById('f-limit').value);
      const notes = document.getElementById('f-note').value;
      const period = document.getElementById('f-period').value;
      const status = document.getElementById('f-status').value;
      const currency = document.getElementById('f-currency').value;
      
      if (!limit) { alert('Please enter a limit'); return; }

      const bData = {
        id: eid || 'BUD' + Date.now(),
        period: period,
        categoryId: document.getElementById('f-cat-id').value,
        category: cat,
        categoryGroup: document.getElementById('f-cat-group').value,
        type: document.getElementById('f-cat-type').value,
        budget: limit,
        currency: currency,
        notes: notes,
        status: status,
        updateTime: new Date().toISOString()
      };

      if (eid) {
        const idx = budgets.findIndex(x => x.id === eid);
        if(idx >= 0) budgets[idx] = bData;
      } else {
        // Unique category check for new budgets
        const existing = budgets.findIndex(b => b.category === cat && b.period === period);
        if (existing >= 0) {
           budgets[existing] = bData;
        } else {
           budgets.push(bData);
        }
      }

      localStorage.setItem('budgets', JSON.stringify(budgets));
      closeModal();
      refreshList();
      if(window.showToast) showToast('Budget updated!', 'success', 'check-circle');
    }

    function deleteBudget(id) {
      showConfirm('Remove this budget?', () => {
        const idx = budgets.findIndex(x => (x.id || '') === id);
        if(idx >= 0) budgets.splice(idx, 1);
        else budgets.splice(id, 1); // fallback to index
        localStorage.setItem('budgets', JSON.stringify(budgets));
        refreshList();
        if(typeof showToast === 'function') showToast('Budget deleted correctly!', 'success', 'trash-2');
      });
    }

    populateCategories();
    refreshList();
  </script>
</body>
</html>
  </script>
</body>
</html>
