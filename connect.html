<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Cloud - Finance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="theme.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .connect-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 2.5rem;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 10;
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .qr-container {
      width: 100%;
      aspect-ratio: 1/1;
      background: var(--bg-input);
      border: 2px dashed var(--accent);
      border-radius: 1.5rem;
      margin: 2rem 0;
      overflow: hidden;
      position: relative;
    }

    #reader {
      width: 100% !important;
      border: none !important;
    }

    #reader video {
      object-fit: cover !important;
    }

    .sync-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 1.5rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: var(--accent);
      filter: blur(150px);
      opacity: 0.15;
      z-index: 1;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="glow" style="top: -100px; left: -100px;"></div>
  <div class="glow" style="bottom: -100px; right: -100px;"></div>

  <div class="connect-card">
    <div
      style="width: 64px; height: 64px; background: rgba(139,92,246,0.1); color: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
      <i data-lucide="cloud-lightning" style="width: 32px; height: 32px;"></i>
    </div>
    <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Connect Cloud</h1>
    <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">Scan your ledger code to start
      tracking.</p>

    <div class="qr-container" style="border: 1px solid var(--border); background: #000; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
      <div id="reader" style="border:none;"></div>
      
      <!-- Premium Overlay Effects -->
      <div id="scan-frame" style="position: absolute; inset: 20px; border: 2px solid var(--accent); border-radius: 1.5rem; pointer-events: none; z-index: 5; box-shadow: 0 0 40px rgba(139, 92, 246, 0.3);">
        <div style="position: absolute; top: 0; left: 0; width: 30px; height: 30px; border-top: 4px solid var(--accent); border-left: 4px solid var(--accent); border-radius: 8px 0 0 0;"></div>
        <div style="position: absolute; top: 0; right: 0; width: 30px; height: 30px; border-top: 4px solid var(--accent); border-right: 4px solid var(--accent); border-radius: 0 8px 0 0;"></div>
        <div style="position: absolute; bottom: 0; left: 0; width: 30px; height: 30px; border-bottom: 4px solid var(--accent); border-left: 4px solid var(--accent); border-radius: 0 0 0 8px;"></div>
        <div style="position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; border-bottom: 4px solid var(--accent); border-right: 4px solid var(--accent); border-radius: 0 0 8px 0;"></div>
        <div id="scan-laser" style="position: absolute; top: 10%; left: 0; width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--accent), transparent); box-shadow: 0 0 15px var(--accent); animation: laserMove 2s ease-in-out infinite;"></div>
      </div>

      <div id="sync-overlay" class="sync-overlay">
        <div class="spinner"></div>
        <p style="font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em;">LINKING DATA...</p>
      </div>
    </div>

    <style>
      @keyframes laserMove {
        0%, 100% { top: 10%; opacity: 0.3; }
        50% { top: 90%; opacity: 1; }
      }
      #reader__status_span { display: none !important; }
      #reader__dashboard { padding: 10px !important; }
      #reader__camera_selection { 
        background: var(--bg-input); 
        color: white; 
        border: 1px solid var(--border); 
        border-radius: 0.5rem; 
        padding: 5px; 
        margin-bottom: 10px;
        font-size: 0.75rem;
      }
      button#html5-qrcode-button-camera-start, button#html5-qrcode-button-camera-stop {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 0.75rem;
        font-weight: 700;
        font-size: 0.75rem;
        cursor: pointer;
        margin: 5px;
        transition: 0.3s;
      }
    </style>

    <div
      style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: var(--glass); border-radius: 1rem; border: 1px solid var(--border);">
      <i data-lucide="info" style="width: 16px; color: var(--text-secondary);"></i>
      <p style="font-size: 0.7rem; color: var(--text-secondary); text-align: left;">Your device will automatically pull
        all records from the cloud after scanning.</p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const html5QrCode = new Html5Qrcode("reader");
    const syncOverlay = document.getElementById('sync-overlay');

    const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

    async function onScanSuccess(decodedText) {
      const scriptUrl = decodedText.trim();
      if (!scriptUrl.startsWith('http')) return;

      // 1. Stop scanning
      await html5QrCode.stop();

      // 2. Visual feedback
      syncOverlay.style.display = 'flex';

      // 3. Save URL
      localStorage.setItem('cloud_sheet_url', scriptUrl);

      try {
        // 4. Pull data from cloud using global engine (Overwrite on first connect)
        const count = await window.CloudSync.pull(scriptUrl, 'overwrite');

        if (count >= 0) {
          if (typeof showToast === 'function') showToast(`Linked! Retrieved ${count} records.`, 'success', 'cloud-check');

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        }
      } catch (err) {
        console.error(err);
        alert('Authentication failed or invalid QR code. Please try again.');
        location.reload();
      }
    }

    html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);
  </script>
</body>

</html>
