<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Vault - Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .receipt-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding-bottom: 2rem;
    }
    .receipt-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }
    .receipt-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .receipt-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: var(--bg-input);
    }
    .receipt-meta { padding: 0.875rem; }
    .r-title { font-weight: 700; font-size: 0.8125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r-sub { font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.2rem; }
    
    #viewer-modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); 
      display: none; align-items: center; justify-content: center; z-index: 9999; padding: 1.5rem;
    }
    #viewer-img { max-width: 100%; max-height: 80vh; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <div class="sticky-nav">
      <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button onclick="window.location.href='index.html'" class="back-btn"><i data-lucide="chevron-left"></i></button>
          <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary);">Receipt Vault</h1>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button onclick="toggleSearch()" class="back-btn"><i data-lucide="search"></i></button>
          <div id="receipt-count" style="font-size: 0.75rem; background: rgba(139, 92, 246, 0.1); color: var(--accent); padding: 0.25rem 0.6rem; border-radius: 20px; font-weight: 700;">0 Files</div>
        </div>
      </header>

      <div id="search-container" style="position: relative; display: none; transform-origin: top; animation: slideInSearch 0.3s ease-out;">
        <i data-lucide="search" style="position: absolute; left: 1rem; top: 0.8rem; width: 18px; color: var(--text-secondary);"></i>
        <input type="text" id="r-search" class="f-input" placeholder="Search by merchant or item..." style="width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 0.75rem 1rem 0.75rem 2.8rem; color: var(--text-primary); outline: none;">
      </div>
    </div>

    <style>
      @keyframes slideInSearch { from { opacity: 0; transform: scaleY(0); } to { opacity: 1; transform: scaleY(1); } }
    </style>

    <script>
      window.toggleSearch = () => {
        const s = document.getElementById('search-container');
        const inp = document.getElementById('r-search');
        if (s.style.display === 'none') {
          s.style.display = 'block';
          inp.focus();
        } else {
          s.style.display = 'none';
          inp.value = '';
          const event = new Event('input', { bubbles: true });
          inp.dispatchEvent(event);
        }
      };
    </script>

    <div id="receipt-list" class="receipt-grid">
      <!-- Dynamic Receipts -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(139, 92, 246, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="file-text" style="width: 40px; height: 40px; color: var(--accent);"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">Vault Empty</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">You haven't attached any receipts to your transactions yet.</p>
    </div>
  </div>

  <!-- Fullscreen Viewer -->
  <div id="viewer-modal" onclick="if(event.target.id === 'viewer-modal') this.style.display='none'">
     <div style="position: absolute; top: 1.5rem; left: 1.5rem; color: #ef4444; cursor: pointer; background: rgba(239, 68, 68, 0.1); padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;" onclick="deleteReceipt()"><i data-lucide="trash-2" style="width: 20px;"></i></div>
     <div style="position: absolute; top: 1.5rem; right: 1.5rem; color: white; cursor: pointer; background: rgba(255, 255, 255, 0.1); padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;" onclick="document.getElementById('viewer-modal').style.display='none'"><i data-lucide="x" style="width: 20px;"></i></div>
     <img id="viewer-img" src="" onclick="event.stopPropagation()">
     <div id="viewer-meta" style="position: absolute; bottom: 3rem; text-align: center; color: white;">
        <h4 id="v-title" style="font-weight: 800; font-size: 1.25rem;">Indomaret</h4>
        <p id="v-sub" style="opacity: 0.7; font-size: 0.875rem;">March 24, 2024 • Groceries</p>
     </div>
  </div>

  <script>
    lucide.createIcons();
    const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
    const receipts = txs.filter(t => t.receipt);

    function renderGallery(list) {
      const container = document.getElementById('receipt-list');
      const empty = document.getElementById('empty-state');
      document.getElementById('receipt-count').innerText = `${list.length} Files`;
      
      container.innerHTML = '';
      if (list.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'block';
        return;
      } else {
        container.style.display = 'grid';
        empty.style.display = 'none';
      }

      list.forEach(t => {
        const card = document.createElement('div');
        card.className = 'receipt-card';
        card.innerHTML = `
          <img src="${t.receipt}" class="receipt-img">
          <div class="receipt-meta">
            <div class="r-title">${t.merchant || t.name}</div>
            <div class="r-sub">${t.date || 'No Date'} • Rp ${t.amount.toLocaleString('id-ID')}</div>
          </div>
        `;
        card.onclick = () => showViewer(t);
        container.appendChild(card);
      });
      lucide.createIcons();
    }

    let currentReceiptTx = null;

    function showViewer(t) {
      currentReceiptTx = t;
      document.getElementById('viewer-img').src = t.receipt;
      document.getElementById('v-title').innerText = t.merchant || t.name;
      document.getElementById('v-sub').innerText = `${t.date} • ${t.category}`;
      document.getElementById('viewer-modal').style.display = 'flex';
      lucide.createIcons();
    }

    function deleteReceipt() {
      if(typeof showConfirm === 'function') {
        showConfirm('Remove this receipt from transaction?', () => {
          const allTxs = JSON.parse(localStorage.getItem('transactions') || '[]');
          const idx = allTxs.findIndex(x => x.id === currentReceiptTx.id);
          if (idx >= 0) {
            allTxs[idx].receipt = null;
            localStorage.setItem('transactions', JSON.stringify(allTxs));
          }
          document.getElementById('viewer-modal').style.display='none';
          if(typeof showToast === 'function') showToast('Receipt deleted successfully!', 'success', 'trash-2');
          location.reload();
        });
      }
    }

    document.getElementById('r-search').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = receipts.filter(r => 
        (r.merchant || '').toLowerCase().includes(q) || 
        (r.name || '').toLowerCase().includes(q) ||
        (r.category || '').toLowerCase().includes(q)
      );
      renderGallery(filtered);
    };

    renderGallery(receipts);
  </script>
</body>
</html>
