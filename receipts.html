<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Vault - Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .receipt-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding-bottom: 2rem;
    }
    .receipt-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }
    .receipt-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .receipt-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: var(--bg-input);
    }
    .receipt-meta { padding: 0.875rem; }
    .r-title { font-weight: 700; font-size: 0.8125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r-sub { font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.2rem; }
    
    #viewer-modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); 
      display: none; align-items: center; justify-content: center; z-index: 9999; padding: 1.5rem;
    }
    #viewer-img { max-width: 100%; max-height: 80vh; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; padding: 1.5rem;">
    <header class="header" style="margin-bottom: 2rem; border-bottom: none;">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button onclick="window.location.href='index.html'" style="background: none; border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center;">
          <i data-lucide="chevron-left"></i>
        </button>
        <h1 style="font-size: 1.5rem; font-weight: 800;">Receipt Vault</h1>
      </div>
      <div id="receipt-count" style="font-size: 0.75rem; background: rgba(139, 92, 246, 0.1); color: var(--accent); padding: 0.25rem 0.6rem; border-radius: 20px; font-weight: 700;">0 Files</div>
    </header>

    <div class="search-box" style="margin-bottom: 1.5rem; position: relative;">
      <i data-lucide="search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-secondary);"></i>
      <input type="text" id="r-search" placeholder="Search by merchant or item..." style="width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem 1rem 1rem 2.8rem; color: var(--text-primary); outline: none;">
    </div>

    <div id="receipt-list" class="receipt-grid">
      <!-- Dynamic Receipts -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem 2rem;">
       <div style="width: 80px; height: 80px; background: rgba(139, 92, 246, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
          <i data-lucide="file-text" style="width: 40px; height: 40px; color: var(--accent);"></i>
       </div>
       <h3 style="font-weight: 700; margin-bottom: 0.5rem;">Vault Empty</h3>
       <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">You haven't attached any receipts to your transactions yet.</p>
    </div>
  </div>

  <!-- Fullscreen Viewer -->
  <div id="viewer-modal" onclick="this.style.display='none'">
     <div style="position: absolute; top: 1.5rem; right: 1.5rem; color: white; cursor: pointer;"><i data-lucide="x"></i></div>
     <img id="viewer-img" src="" onclick="event.stopPropagation()">
     <div id="viewer-meta" style="position: absolute; bottom: 3rem; text-align: center; color: white;">
        <h4 id="v-title" style="font-weight: 800; font-size: 1.25rem;">Indomaret</h4>
        <p id="v-sub" style="opacity: 0.7; font-size: 0.875rem;">March 24, 2024 • Groceries</p>
     </div>
  </div>

  <script>
    lucide.createIcons();
    const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
    const receipts = txs.filter(t => t.receipt);

    function renderGallery(list) {
      const container = document.getElementById('receipt-list');
      const empty = document.getElementById('empty-state');
      document.getElementById('receipt-count').innerText = `${list.length} Files`;
      
      container.innerHTML = '';
      if (list.length === 0) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'grid';
      }

      list.forEach(t => {
        const card = document.createElement('div');
        card.className = 'receipt-card';
        card.innerHTML = `
          <img src="${t.receipt}" class="receipt-img">
          <div class="receipt-meta">
            <div class="r-title">${t.merchant || t.name}</div>
            <div class="r-sub">${t.date || 'No Date'} • Rp ${t.amount.toLocaleString('id-ID')}</div>
          </div>
        `;
        card.onclick = () => showViewer(t);
        container.appendChild(card);
      });
      lucide.createIcons();
    }

    function showViewer(t) {
      document.getElementById('viewer-img').src = t.receipt;
      document.getElementById('v-title').innerText = t.merchant || t.name;
      document.getElementById('v-sub').innerText = `${t.date} • ${t.category}`;
      document.getElementById('viewer-modal').style.display = 'flex';
      lucide.createIcons();
    }

    document.getElementById('r-search').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = receipts.filter(r => 
        (r.merchant || '').toLowerCase().includes(q) || 
        (r.name || '').toLowerCase().includes(q) ||
        (r.category || '').toLowerCase().includes(q)
      );
      renderGallery(filtered);
    };

    renderGallery(receipts);
  </script>
</body>
</html>
